name: publish hehuan cloud

on:
  push:
    branches:
      - main
      - master
    paths:
      - public/hehuan/**
      - src/雌堕合欢宗/**
      - scripts/sync-hehuan-cloud-assets.mjs
      - scripts/publish-hehuan-cloud-repo.mjs
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/publish_hehuan_cloud.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install and build cloud assets
        run: pnpm install && pnpm build:cloud

      - name: Publish public allowlist repository
        run: pnpm publish:hehuan-cloud
        env:
          HEHUAN_CLOUD_REPO: chen986347310-svg/hehuan-cloud-assets
          HEHUAN_CLOUD_BRANCH: main
          HEHUAN_CLOUD_TOKEN: ${{ secrets.HEHUAN_CLOUD_ASSETS_TOKEN }}
