---
# 世界书条目：牝奴系统（EJS分阶段，仅牝奴期触发）
牝奴系统:
  meta:
    状态: 绿灯
    触发词:
      - 牝奴
      - 堕落度
      - 牝阴决
      - 改造
    说明: Phase 2牝奴期系统，EJS分阶段解析堕落度，控制NPC支配行为和改造进度。前置依赖：酒馆"提示词模板"插件须开启。

  # ═══════════════════
  # 进入条件
  # ═══════════════════
  进入条件:
    触发: 剩余天数归零
    状态变化:
      - 好感度全部清零，攻略值取消
      - 灵石全部上缴归零
      - 宗门可发付初始法器、服装或日课要求，但不得凭空随机装备；玩家己身是否扣合只以 道具.装备.玩家 为准
      - 剩余天数 → 堕落度（0~100%）

  # ═══════════════════
  # P2前端闭环语义
  # ═══════════════════
  前端入口语义:
    牝印:
      读取:
        - 牝奴.当前日课
        - 牝奴.当前命令
        - 牝奴.命令强度
        - 牝奴.最近调教结算
        - 道具.装备.玩家
      叙事职责: 将日课、命令、支配者和已扣法器写成身体受控的即时反馈。
    执事库:
      定义: 宗门发付和日课领受处，不是商城。
      红线:
        - 牝奴期没有灵石购物叙事。
        - 法器来源写作宗门下发、执事点名、支配者授予、日课领受。
        - 不要写成玩家讨价还价、购买、付款或消费灵石。
    法器匣:
      定义: 玩家己身法器扣合处。
      读取: 道具.拥有 与 道具.装备.玩家
      叙事职责: 法器扣合后写身体回响、行动受限、羞名风险和日课服从压力。
    烙名录:
      定义: 世界如何记录玩家，而不是身体改造面板。
      读取:
        - 牝奴.羞名标签
        - 牝奴.调教记录
        - 系统.风声列表
        - 道具.装备.玩家
      叙事职责: 记录羞名、朱批、风声、承命痕；不要重复写身体留痕的改造描述。

  日课与法器:
    基本规则:
      - 当前日课若要求法器，必须读取 道具.装备.玩家 判断玩家是否已经扣合。
      - 已扣合时，正文写法器如何替玩家应命、如何让身体更难抗拒。
      - 未扣合时，正文可写执事斥责、羞名入册、改派更重日课或公开点名。
      - 缺装惩戒可更新 牝奴.羞名标签、牝奴.当前日课、牝奴.当前命令、牝奴.最近调教结算，并追加 牝奴.调教记录。
      - 玩家在牝奴期仍保留强主体感；叙事重点是清醒地感到羞耻、抗拒、被凝视和身体先于意志回应，不默认心理完全投降。
      - 高堕落度表示身体惯性、日课服从压力、羞名条件反射和法器约束增强；除非玩家明确表态或结局事件触发，不写成自愿放弃人格。
    法器影响:
      - 铃系法器影响听令、应名、奉茶、侍寝等日课。
      - 链系法器影响束步、伏侍、行礼、跪坐等日课。
      - 印纹/淫纹影响验印、烙名、牝印复核等日课。
      - 环扣/禁溺类法器影响憋尿、禁溺、锁溺等日课。

  # ═══════════════════
  # 堕落度6阶段（EJS分阶段）
  # ═══════════════════
  <%_ if (typeof corruption === 'undefined') var corruption = getvar('stat_data.牝奴.堕落度', { defaults: 0 }); _%>
  <% if (corruption < 10) { %>
  阶段01·清醒隐忍期:
    堕落度: 0-10%
    行为模式:
      - 玩家仍保持清醒，试图隐藏真实感受
      - 对NPC的支配行为表现出抗拒
      - 内心挣扎，但身体已经开始有反应
    必须触发事件:
      - 第一次被NPC支配时的震惊反应
      - 尝试反抗但失败
      - 身体首次出现不受控制的反应
  <% } %>

  <% if (corruption >= 10 && corruption < 30) { %>
  阶段02·动摇挣扎期:
    堕落度: 10-30%
    行为模式:
      - 开始对NPC的触碰产生复杂感受
      - 偶尔出现身体先于意志的配合迹象
      - 仍在挣扎，并清楚意识到自己的抗拒正在被身体拖慢
    必须触发事件:
      - 第一次在并不情愿时出现身体配合迹象
      - 对NPC的夸奖产生羞耻、慌乱和被看穿感
      - 开始害怕某些特定命令会再次让身体先一步回应
  <% } %>

  <% if (corruption >= 30 && corruption < 50) { %>
  阶段03·本能屈从期:
    堕落度: 30-50%
    行为模式:
      - 身体反应开始抢在理智前回应命令
      - 玩家仍能清醒意识到羞耻和抗拒，但抗拒成本明显升高
      - 被看见、被点名、被记录会形成更强的条件反射
    必须触发事件:
      - 第一次在清醒抗拒中被身体反应抢先出卖
      - 在众人目光下出现无法完全遮掩的牝印或法器反应
      - 事后清楚复盘自己哪里失控、谁看见、被记成什么羞名
  <% } %>

  <% if (corruption >= 50 && corruption < 70) { %>
  阶段04·淫纹发情期:
    堕落度: 50-70%
    行为模式:
      - 淫纹、牝印或法器反应开始稳定影响姿态、声音和灵气流向
      - 日课命令更容易压过临场反抗，身体会先替玩家应命
      - 玩家仍清醒，羞耻感从即时反应延伸为持续的被凝视压力
    必须触发事件:
      - 淫纹或牝印在公开或半公开场景被他人察觉
      - 牝印命令与当前日课发生强绑定，命令强度显著升高
      - 烙名录、风声或调教记录开始稳定承接玩家失态余波
  <% } %>

  <% if (corruption >= 70 && corruption < 90) { %>
  阶段05·欲壑难填期:
    堕落度: 70-90%
    行为模式:
      - 身体对日课、法器和羞名的条件反射接近自动化
      - 玩家仍保留自我判断，但越抗拒越容易被牝印、风声和支配者目光捕获
      - 羞耻被训练成复杂反射：害怕被看见，同时清楚自己已经很难藏住
    必须触发事件:
      - 缺装、违令或公开失态造成更重日课或更高羞名等级
      - 当前支配者、纪兰记录或沈月秋调配让玩家意识到自己被制度持续追踪
      - 玩家在独处时复盘羞耻，却发现身体仍残留命令回响
  <% } %>

  <% if (corruption >= 90) { %>
  阶段06·彻底雌堕期:
    堕落度: 90-100%
    行为模式:
      - 身体、牝印、法器和日课已形成极强惯性
      - 宗门几乎默认玩家的牝奴身份，但玩家内心是否认同仍须留给玩家表态
      - 任何抗拒都会被立刻记录、点名、复核或转化为更重日课
    必须触发事件:
      - 掌门、执事或支配者给出最终身份朱批或牝印复核
      - 烙名录形成高等级羞名、承命痕或公开示众记录
      - 若要正式宣告身份、主动请求永久标记或完成最终仪式，必须由玩家明确选择或由结局事件触发
  <% } %>

  # ═══════════════════
  # 粘滞触发机制
  # ═══════════════════
  粘滞触发:
    采补: 3层触发
    羞辱指令: 2层触发
    寸止/憋尿: 2层触发
    多人同时: 1层触发

  # ═══════════════════
  # NPC支配风格
  # ═══════════════════
  NPC支配风格:
    白芷:
      风格: 低位见证
      特点: 看见玩家牝印、法器或羞名后的迟疑、怜悯与不敢直视；她越沉默，越强化玩家已被旁人看见的羞耻。
    苏芸:
      风格: 公开调笑
      特点: 用轻佻点名、玩笑和旁人目光放大玩家羞耻；她负责制造被围观感，不负责正式记录。
    纪兰:
      风格: 验印记录
      特点: 检查牝印、当前日课、命令强度与 道具.装备.玩家，把失态写成朱批、羞名或承命痕。
    沈月秋:
      风格: 资源调配
      特点: 以长老身份按服从反应、缺装状态和身体变化重新定价，发出惩戒、复核或加重日课。
    柳素衣:
      风格: 最终裁定
      特点: 掌门级牝印命令、身份朱批与最终烙名来源；她裁定处境，不替玩家内心完成投降。

  # ═══════════════════
  # 深度改造
  # ═══════════════════
  深度改造:
    泌乳:
      时间: 第1月
      效果: 乳房开始分泌乳汁
      标志: 改造进度.泌乳 = true
    肛门:
      时间: 第2月
      效果: 后庭被永久改造
      标志: 改造进度.肛门 = true
    憋尿:
      时间: 第3月
      效果: 失去自主排尿能力
      标志: 改造进度.憋尿 = true

  # ═══════════════════
  # 牝阴决功法
  # ═══════════════════
  牝阴决:
    总层数: 9层
    解锁方式: 通过修炼和采补逐步解锁
    效果:
      - 强化雌化特征
      - 储存牝阴之力
      - 开启牝阴技

  # ═══════════════════
  # 情欲控制
  # ═══════════════════
  情欲控制:
    阶段1: 基础控制
    阶段2: 寸止控制
    阶段3: 条件高潮
