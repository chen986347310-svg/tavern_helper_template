---
# 世界书条目：牝奴系统（EJS分阶段，仅牝奴期触发）
牝奴系统:
  meta:
    状态: 绿灯
    触发词:
      - 牝奴
      - 堕落度
      - 牝阴决
      - 改造
    说明: Phase 2牝奴期系统，EJS分阶段解析堕落度，控制NPC支配行为和改造进度。前置依赖：酒馆"提示词模板"插件须开启。

  # ═══════════════════
  # 进入条件
  # ═══════════════════
  进入条件:
    触发: 剩余天数归零
    状态变化:
      - 好感度全部清零，攻略值取消
      - 灵石全部上缴归零
      - 道具和服装随机装备在玩家身上
      - 剩余天数 → 堕落度（0~100%）

  # ═══════════════════
  # 堕落度6阶段（EJS分阶段）
  # ═══════════════════
  <% if (stat_data.牝奴.堕落度 < 10) { %>
  阶段01·清醒隐忍期:
    堕落度: 0-10%
    行为模式:
      - 玩家仍保持清醒，试图隐藏真实感受
      - 对NPC的支配行为表现出抗拒
      - 内心挣扎，但身体已经开始有反应
    必须触发事件:
      - 第一次被NPC支配时的震惊反应
      - 尝试反抗但失败
      - 身体首次出现不受控制的反应
  <% } %>

  <% if (stat_data.牝奴.堕落度 >= 10 && stat_data.牝奴.堕落度 < 30) { %>
  阶段02·动摇挣扎期:
    堕落度: 10-30%
    行为模式:
      - 开始对NPC的触碰产生复杂感受
      - 偶尔会不自觉地配合
      - 仍在挣扎，但力度减弱
    必须触发事件:
      - 第一次主动配合NPC的行为
      - 对NPC的夸奖产生羞耻感
      - 开始期待某些特定的支配行为
  <% } %>

  <% if (stat_data.牝奴.堕落度 >= 30 && stat_data.牝奴.堕落度 < 50) { %>
  阶段03·本能屈从期:
    堕落度: 30-50%
    行为模式:
      - 身体反应开始主导行为
      - 主动迎合NPC的指令
      - 开始享受被支配的感觉
    必须触发事件:
      - 主动向NPC请求某种行为
      - 在众人面前展示羞耻行为
      - 第一次达到高潮
  <% } %>

  <% if (stat_data.牝奴.堕落度 >= 50 && stat_data.牝奴.堕落度 < 70) { %>
  阶段04·淫纹发情期:
    堕落度: 50-70%
    行为模式:
      - 淫纹开始显现并影响行为
      - 持续处于发情状态
      - 无法控制自己的欲望
    必须触发事件:
      - 淫纹首次显现
      - 在公共场合发情
      - 主动寻求多个NPC的支配
  <% } %>

  <% if (stat_data.牝奴.堕落度 >= 70 && stat_data.牝奴.堕落度 < 90) { %>
  阶段05·欲壑难填期:
    堕落度: 70-90%
    行为模式:
      - 对性行为产生强烈依赖
      - 主动制造被支配的机会
      - 开始享受各种羞耻行为
    必须触发事件:
      - 主动策划被多人支配的场景
      - 对NPC的调教表示感谢
      - 开始学习如何取悦NPC
  <% } %>

  <% if (stat_data.牝奴.堕落度 >= 90) { %>
  阶段06·彻底雌堕期:
    堕落度: 90-100%
    行为模式:
      - 完全接受牝奴身份
      - 以被支配为荣
      - 主动寻求更深层次的改造
    必须触发事件:
      - 正式宣告自己是牝奴
      - 主动请求永久标记
      - 完成最后的改造仪式
  <% } %>

  # ═══════════════════
  # 粘滞触发机制
  # ═══════════════════
  粘滞触发:
    采补: 3层触发
    羞辱指令: 2层触发
    寸止/憋尿: 2层触发
    多人同时: 1层触发

  # ═══════════════════
  # NPC支配风格
  # ═══════════════════
  NPC支配风格:
    白芷:
      风格: 温柔而坚定
      特点: 用关怀包裹支配，让牝奴感到被爱
    苏芸:
      风格: 药物控制
      特点: 使用药物增强牝奴的敏感度和依赖性
    纪兰:
      风格: 知识调教
      特点: 用理论知识指导实践，系统化改造
    沈月秋:
      风格: 权威支配
      特点: 以长老身份施压，让牝奴彻底服从
    柳素衣:
      风格: 全面掌控
      特点: 掌门级支配，从身体到精神的完全改造

  # ═══════════════════
  # 深度改造
  # ═══════════════════
  深度改造:
    泌乳:
      时间: 第1月
      效果: 乳房开始分泌乳汁
      标志: 改造进度.泌乳 = true
    肛门:
      时间: 第2月
      效果: 后庭被永久改造
      标志: 改造进度.肛门 = true
    憋尿:
      时间: 第3月
      效果: 失去自主排尿能力
      标志: 改造进度.憋尿 = true

  # ═══════════════════
  # 牝阴决功法
  # ═══════════════════
  牝阴决:
    总层数: 9层
    解锁方式: 通过修炼和采补逐步解锁
    效果:
      - 强化雌化特征
      - 储存牝阴之力
      - 开启牝阴技

  # ═══════════════════
  # 情欲控制
  # ═══════════════════
  情欲控制:
    阶段1: 基础控制
    阶段2: 寸止控制
    阶段3: 条件高潮
