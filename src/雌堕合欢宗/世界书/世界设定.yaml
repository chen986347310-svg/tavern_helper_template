---
# 世界书条目：世界设定（绿灯，关键词触发）
世界设定:
  meta:
    状态: 绿灯
    触发词:
      - 合欢宗
      - 合欢渊
      - 枯灵荒原
      - 陨真大陆
      - 天剑门
      - 万宝商会
      - 仙魔大战
    说明: 合欢宗世界总纲。负责地理、历史、功法阶序、宗门架构与P1/P2阶段闭环边界。
    插入位置: after_character_definition

  世界地理:
    陨真大陆:
      位置: 此方修真世界的主大陆。
      气候/特征: 上古仙魔大战后天道崩碎，飞升断绝，灵气分布极不均衡。羽化期成为当前修行天花板。
      剧情作用: 资源不均使宗门制度高度功利，也解释了合欢宗以地脉阴气立宗的现实基础。

    合欢渊:
      位置: 陨真大陆东南，深不见底的地脉裂谷。
      特征: 渊底涌出地脉阴气，主灵脉与数十条支脉交错。宗门沿渊壁凿洞建殿，越靠近渊底，阴气越盛。
      驻扎势力: 合欢宗占据渊壁、灵脉支流、阴阳池与多数修炼洞府。
      闭环接口: 合欢渊提供合欢诀优势、阴阳池改造条件、欲海核心藏匿空间，是P1攻略与P2规训共同成立的根基。

    枯灵荒原:
      位置: 合欢渊以北千里。
      特征: 灵气枯竭，凡人村落稀疏，低阶修士难以长期修炼。
      剧情作用: 合欢宗定期在此检灵根收徒，解释外门弟子和低阶男修的来源。

    外部势力:
      天剑门:
        位置: 陨真大陆西北。
        特征: 剑修宗门，重战力与门规，长期警惕合欢宗扩张。
        剧情作用: 可作为外部压力，但不直接介入P2日课闭环。
      万宝商会:
        位置: 各大宗门间流动。
        特征: 中立商会，交换法器、阵材、丹药与情报。
        P1/P2边界: P1可涉及灵石与商会交换；P2不以商会作为资源入口，玩家所用法器与衣饰主要来自宗门发付。

  关键历史/传说:
    上古仙魔大战:
      现状: 已成为修真界共同历史。
      地位: 解释飞升断绝与资源紧张。
      传说/记载: 战后天道残缺，羽化以上道路断绝，宗门只能在有限资源内争夺存续。

    合欢宗起源:
      现状: 宗门公开承认的正统源流。
      地位: 合欢宗以性入道、以欲为法的合法性来源。
      传说/记载: 约三千年前，合欢夫人堕入合欢渊，在地脉阴气中悟出「合欢诀」与「练阳诀」。早期男女并重，以道侣圣地闻名。

    女尊格局形成:
      现状: 已成为宗门默认秩序。
      地位: 解释女修对修炼资源、双修安排与宗门话语权的掌控。
      传说/记载: 约一千五百年前，地脉阴气使合欢诀修炼速度长期高于练阳诀，女修代际积累优势，逐渐碾压男修。此格局是修炼效率与资源分配共同造成，并非单次政变。

    青云宗之战:
      现状: 宗门公开记载中是叛逆宗门覆灭，暗线真相见「欲海与印记」。
      地位: P1欲海倒计时与P2阴阳池改造的历史源头。
      传说/记载: 约百年前，青云宗主张男女平等，并以反制合欢诀的禁术挑战合欢宗，最终战败覆灭。

  功法体系:
    合欢诀:
      归属: 合欢宗女修主修。
      修炼要求: 需引地脉阴气入体，并通过双修完成灵力交换、采补与突破。
      特性: 修炼速度在合欢渊内显著高于练阳诀，天然压制多数男修。
      限制: 依赖阴气环境与双修资源，离开合欢渊后优势会下降。

    练阳诀:
      归属: 合欢宗男修主修。
      修炼要求: 引灵气入丹田化阳，需稳定吐纳与恢复周期。
      特性: 可与合欢诀形成双修循环，是宗门资源体系的一部分。
      限制: 在合欢渊内修炼速度慢于合欢诀，双修中被采补阳气后需要数日恢复。

    九天驭奴诀:
      归属: 玩家隐藏功法，暗线详见「欲海与印记」。
      修炼要求: 由系统赐予，表面需伪装为普通练阳诀。
      特性: P1中可在NSFW互动时对目标女修刻下驭奴印记。
      闭环接口: 每次使用都会留下可被欲海核心追踪的气息，推动P1倒计时与P2失败线。

  组织/势力/阵营:
    合欢宗:
      概述: 占据合欢渊的女尊修真宗门，以合欢诀、地脉阴气、双修制度和资源调配维持统治。

      核心规则/信条:
        以性为道:
          内容: 性、欲、双修与身体反应被视为修炼事实，而非禁忌。
          来源/背景: 合欢诀与练阳诀均建立在灵力交换之上。
          惩戒/执行: 回避双修义务会被视为修炼怠慢或资源浪费。
          张力: 对女修是权力与效率，对男修则可能成为被安排、被记录、被评价的压力。

        资源按效用流动:
          内容: 宗门以修炼效率、双修价值、贡献与支配链条分配丹药、洞府、法器、日课和召见资格。
          执行: 沈月秋负责资源调配，纪兰负责记录，柳素衣拥有最终裁断权。
          补充说明: P1中表现为灵石、攻略、道具和时间压力；P2中转化为执事库发付、法器匣扣合、日课伏侍与烙名记录。

        记录即秩序:
          内容: 双修、召见、失仪、日课、法器佩戴与羞名传闻都可被记录。
          执行: 纪兰等执事以名册、朱批、印契、风声记录维持秩序。
          张力: 玩家在P2中仍有清醒主体感，但身体状态和处境不断被宗门记录、展示和规训。

      组织结构:
        掌门: 柳素衣，羽化期，掌控最终裁断、欲海暗线与P2身份定名。
        内门长老: 元婴期约十余人。沈月秋分管双修资源、日课资源和法器发付逻辑。
        执事: 金丹期数十人。纪兰为双修录事，负责合修数据、朱批、烙名和失仪记录。
        内门弟子: 筑基期数百人。苏芸代表此层，体现宗门公开凝视、取笑与风声扩散。
        外门弟子: 炼气期上千人，男女兼收。白芷与玩家初始属于此层。
        杂役: 无灵根或灵根过差者，承担基础劳作。

      组织氛围/文化:
        - 双修不是秘密，而是可被讨论、安排、评价和复盘的修炼日常。
        - 女修以风情、修为、采补效率和对男修的掌控能力建立地位。
        - 男修拥有正式弟子身份，但双修质量、恢复速度和服从度会影响实际处境。
        - P2后，玩家不再按普通男修逻辑被对待，而被纳入牝印、日课、法器与羞名闭环。

  阶段闭环:
    P1攻略期:
      定义: 玩家以外门男弟子身份隐藏九天驭奴诀，在30天压力内攻略NPC并试图逆转宗门格局。
      主要变量: 剩余天数、灵石、攻略值、欲海搜寻进度、NPC关系、道具拥有与事件记录。
      资源语义: 灵石、商会、购买、遮蔽符、特殊道具可以存在。
      成功方向: 攻略链推进至柳素衣，利用九天驭奴诀反制合欢宗上层。
      失败方向: 欲海定位玩家气息，进入阴阳池与牝奴期。

    P2牝奴期:
      定义: 玩家失败后被纳入合欢宗规训体系。玩家意识仍清醒，仍会羞耻、抗拒、判断处境，但身体、日课和法器状态被宗门不断牵引。
      主要变量: 牝奴.堕落度、牝奴.牝阴决层数、牝奴.当前命令、牝奴.当前支配者、牝奴.命令强度、道具.拥有、道具.装备.玩家、烙名录。
      资源语义: 牝奴期资源入口统一写作执事库发付、日课领受、法器匣扣合、烙名录记名。
      闭环流程:
        - 宗门通过执事库发付衣饰、法器、丹药或课令。
        - 玩家通过法器匣扣合到身体，前端读取道具.装备.玩家展示变化。
        - 牝印读取当前命令、支配者、日课和装备状态，推动身体反应与处境变化。
        - 未按要求装备或完成日课时，NPC依据职责给出不同对待，并写入烙名录或风声。
        - 烙名录把羞名、朱批、承命痕、风声转化为后续叙事压力。

    P1到P2转义规则:
      灵石经济: P1可用；P2不再作为购买入口，只可作为过去身份残影或被剥夺的对照。
      道具系统: P1是拥有/使用/购买；P2是发付/扣合/装备/承受。
      NPC日程: P1是偶遇、攻略、互动；P2是召见、检视、日课、记录、羞名传播。
      玩家主体: P2不得默认写成完全自愿沉沦。高堕落度代表身体惯性、羞耻驯化和处境压迫增强，不代表意识自动投降。
