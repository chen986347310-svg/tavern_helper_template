---
# 世界书条目：世界设定（绿灯，关键词触发）
世界设定:
  meta:
    状态: 绿灯
    触发词:
      - 合欢宗
      - 合欢渊
      - 枯灵荒原
      - 陨真大陆
    说明: 合欢宗世界基础设定。地理、历史、功法体系、宗门架构。触发后激活。
    插入位置: after_character_definition

  # ═══════════════════
  # 地理
  # ═══════════════════
  地理:
    陨真大陆: 上古仙魔大战后天道崩碎，飞升断绝。灵气极度不均。
    合欢渊: 大陆东南，深不见底的裂谷。谷底涌出地脉阴气，宗依渊壁凿洞建殿。渊底主灵脉+外围数十条支流。阴气充沛，天然适合阴属功法。
    枯灵荒原: 合欢渊以北千里。灵气枯竭，凡人村落稀疏。合欢宗主要人口来源——定期来此检灵根收徒。
    其他势力: 天剑门（西北剑修），万宝商会（中立商人）。

  # ═══════════════════
  # 历史
  # ═══════════════════
  历史:
    上古: 仙魔大战致天道崩碎。羽化期为天花板。
    合欢宗起源（约三千年前）: 合欢夫人堕渊悟出「合欢诀」「练阳诀」。早期男女并重，以「道侣圣地」闻名。
    女尊格局（约一千五百年前）: 地脉阴气→合欢诀修炼速度天然快→世代积累→女修碾压男修。自然演变，非政变。
    青云宗之战（约百年前）: 青云宗主张男女平等，创御奴诀反制。战败覆灭。详见「欲海与印记」条目。

  # ═══════════════════
  # 功法
  # ═══════════════════
  功法:
    合欢诀: 女修主修。以性入道，引地脉阴气入体，双修采补为突破手段。天然压制练阳诀。
    练阳诀: 男修主修。引灵气入丹田化阳。修炼速度慢于合欢诀。双修中被采补阳气后需数日恢复。
    男修地位: 正式弟子，有资源和尊严。双修是日常修炼的一部分，非惩罚。

  # ═══════════════════
  # 宗门架构
  # ═══════════════════
  架构:
    掌门: 柳素衣，羽化期。冷峻威严。
    内门长老: 元婴期约十余人。沈月秋分管双修资源调配。
    执事: 金丹期数十人。纪兰为双修录事——记录宗内每次双修数据。
    内门弟子: 筑基期数百人。苏芸为此层。
    外门弟子: 炼气期上千人，男女兼收。白芷与玩家为此层。
    杂役: 无灵根或过差者。

  # ═══════════════════
  # 日常
  # ═══════════════════
  日常:
    男修: 寅时灵脉吐纳练阳诀→辰时早膳→巳至酉杂役或自由→戌时晚膳→亥后自由
    女修: 寅至辰练合欢诀→巳至午听训→未至酉双修采补/炼丹研阵→戌后自由
    互动: 同门交往自然——执勤聊天、经阁偶遇、双修后喝茶复盘。男女修友情恋情存在但不主流。