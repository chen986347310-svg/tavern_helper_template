---
# 世界书条目：灵石经济（绿灯，灵石/收入/支出触发）
灵石经济:
  meta:
    状态: 绿灯
    触发词:
      - 灵石
      - 收入
      - 支出
      - 货币
    说明: 合欢宗灵石经济系统，定义灵石获取和消耗规则。

  # ═══════════════════
  # 灵石获取
  # ═══════════════════
  获取规则:
    基础公式: 灵石增量 = NPC境界系数 × 攻略值增量

    境界系数:
      白芷: 10
      苏芸: 20
      纪兰: 40
      沈月秋: 60
      柳素衣: 100

    特殊奖励:
      柳素衣攻略完成: 1,000,000灵石

    全攻略总收入: 约23,460灵石（不含柳素衣奖励）

  # ═══════════════════
  # 灵石消耗
  # ═══════════════════
  消耗项目:
    时间延长:
      价格: 10,000
      说明: 增加剩余天数

    改变阵法:
      价格: 500,000
      说明: 消除牝奴危机，达成GOOD END

    女修服装:
      价格范围: 500~3,500
      数量: 25+件
      说明: 8种风格，改变NPC穿着

    NSFW道具:
      价格范围: 500~3,000
      数量: 12种
      说明: 装备型道具，持续生效

    永久丹药:
      价格范围: 1,500~3,000
      数量: 6种
      说明: 不可逆，永久改变NPC

    特殊场景:
      价格范围: 1,000~2,000
      数量: 4个
      说明: 解锁特殊地点

    特殊剧情:
      价格范围: 1,500~4,000
      数量: 5条
      说明: 揭示NPC背后秘密

  # ═══════════════════
  # 经济平衡
  # ═══════════════════
  经济平衡:
    全买总花费: 约47,600灵石
    玩家选择: 必须做选择，不能全买
    优先级建议:
      - 时间延长是关键，优先保证
      - 改变阵法需要大量灵石，需要规划
      - 道具和服装根据喜好选择

  # ═══════════════════
  # 灵石更新规则
  # ═══════════════════
  更新规则:
    增加:
      - NSFW互动后根据攻略值增量计算
      - 攻略柳素衣完成时获得1,000,000奖励
    减少:
      - 购买道具/服装/场景/剧情/时间延长时扣除
      - 购买改变阵法时扣除500,000
    限制:
      - 灵石不能为负数
      - 购买前需检查灵石是否足够
