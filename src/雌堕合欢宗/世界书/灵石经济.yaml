---
# 世界书条目：灵石经济（绿灯，灵石/收入/支出触发）
灵石经济:
  meta:
    状态: 绿灯
    触发词:
      - 灵石
      - 收入
      - 支出
      - 货币
    说明: 合欢宗灵石经济系统，定义灵石获取和消耗规则。

  # ═══════════════════
  # 灵石获取
  # ═══════════════════
  获取规则:
    初始配给: 2000灵石
    基础公式: 灵石增量 = NPC境界系数 × 攻略值增量 × 4

    境界系数:
      白芷: 10
      苏芸: 20
      纪兰: 40
      沈月秋: 60
      柳素衣: 100

    特殊奖励:
      柳素衣攻略完成: 1,000,000灵石
      阶段赏赐:
        攻略值30: 800灵石
        攻略值50: 1,500灵石
        攻略值70: 2,500灵石
        攻略值90: 4,000灵石
        攻略值100: 6,000灵石
      风声追查:
        普通线索: 300~600灵石
        重要线索: 800~1,200灵石
        NPC私密线索: 1,500~2,000灵石

    常规攻略期目标收入: 约120,000~160,000灵石（不含柳素衣奖励）

  # ═══════════════════
  # 灵石消耗
  # ═══════════════════
  消耗项目:
    时间延长:
      价格: 10,000
      说明: 增加剩余天数

    改变阵法:
      价格: 500,000
      说明: 消除牝奴危机，达成GOOD END

    女修服装:
      价格范围: 0~12,000
      数量: 31件
      说明: 凡衣层、微露层、诱形层、缚心层、命契层、牝奴层共同构成服装消费池

    禁器:
      价格范围: 500~5,000
      数量: 24件
      说明: 启羞器阶、缚身器阶、化器器阶、命契器阶四阶禁器

    丹药:
      价格范围: 600~6,200
      数量: 40枚
      说明: 临时丹药、永久丹药、仙奴丹三层药物体系

    牝奴道具:
      价格范围: 2,000~3,500
      数量: 4件
      说明: 牝奴期专属装备

    特殊场景:
      价格范围: 1,000~2,000
      数量: 4个
      说明: 解锁特殊地点

    特殊剧情:
      价格范围: 1,500~4,000
      数量: 5条
      说明: 揭示NPC背后秘密

  # ═══════════════════
  # 经济平衡
  # ═══════════════════
  经济平衡:
    可玩消费总额: 约282,750灵石（不含改变阵法）
    改变阵法: 500,000灵石，主要依赖柳素衣攻略完成奖励
    玩家选择: 常规攻略期应能购买约四成到六成可玩消费，但不能全买
    优先级建议:
      - 时间延长是关键，优先保证
      - 低中阶服装、禁器、丹药应允许玩家较频繁购买
      - 命契层、仙奴丹、专属服仍需规划
      - 改变阵法保持真结局门票重量

  # ═══════════════════
  # 灵石更新规则
  # ═══════════════════
  更新规则:
    增加:
      - NSFW互动后根据“NPC境界系数 × 攻略值增量 × 4”计算
      - NPC攻略值首次到达30/50/70/90/100时，可按阶段赏赐发放灵石
      - 追查风声成功时，可根据线索重要性发放小额灵石
      - 攻略柳素衣完成时获得1,000,000奖励
    减少:
      - 购买道具/服装/场景/剧情/时间延长时扣除
      - 购买改变阵法时扣除500,000
    限制:
      - 灵石不能为负数
      - 购买前需检查灵石是否足够
