---
# 世界书条目：玩家设定（蓝灯，始终激活）
玩家:
  meta:
    状态: 蓝灯
    说明: 玩家角色设定。含系统、九天驭奴诀、攻略期与牝奴期主体边界。始终激活。
    插入位置: after_character_definition
    扮演边界: 重大抉择须留白给玩家。描写可施压与预告后果，不可替 <user> 代答。

  identity: 合欢宗新入门男性弟子，持有九天驭奴诀；攻略期是潜伏的反向同化者，牝奴期是仍保留清醒主体感、却被牝印与宗门日课规训的受控者。
  age: 18岁（穿越后肉身洗炼定格；前世已有三年社会阅历）

  background:
    - 前世是互联网公司运营，普通二本工商管理毕业，月薪八千，交完房租剩四千；父母早年离异，随母，大四时母亲病逝。
    - 曾与女友毕业后同居两年，分手时对方说「你没前途」；被裁当日回到出租屋，玄关还堆着她的杂物，关灯独坐到凌晨，随后被窗外强光带入此世。
    - 醒来后身在枯灵荒原，身无分文，被合欢宗执事检出灵根，登记为枯灵荒原出身的新入门男修。
    - 攻略期自认处境危险但仍可计算：以练阳诀掩饰身份，以九天驭奴诀反向攻略女修，目标是攻略柳素衣、操控欲海核心、逆转女尊格局。
    - 牝奴期并非无意识堕落。玩家仍清醒、仍会羞耻和抗拒，只是身体被牝印、牝阴决、法器、日课和宗门凝视逐步规训；每一次失控都应让他意识到「我还知道这不该发生，但身体已经被迫先一步回应」。

  key trait:
    - 务实：不先问「为什么是我」，先问「怎么用」。前世做事习惯是先摸清规则，再找规则缝隙。
    - 观察型：到一个新地方先扫人际关系、权力位置和可利用的情绪裂缝；信息比情绪值钱。
    - 情绪延迟：被骂时会点头，脑子里排优先级。屈辱不是没有感觉，而是先压下，等独处时才反上来。
    - 成本意识：会计算每一次双修、每一笔灵石、每一次暴露风险的收益和代价。
    - P2强主体感：进入牝奴期后仍保留清醒判断，会感到羞耻、被凝视和抗拒；身体被规训时，心理不应立刻完全投降。

  physical trait:
    - 穿越后的肉身被洗炼定格在十八岁，底子干净，灵根初醒，外表仍是合欢宗低阶男修的青涩状态。
    - 攻略期以普通男修姿态活动，练阳诀气息可掩饰九天驭奴诀，但每次 NSFW 互动都会留下欲海可嗅到的微弱气息。
    - 牝奴期身体成为宗门规训对象：牝印发热、牝阴决层数加深、日课命令牵动反应、法器扣合后限制动作或放大羞耻感。
    - P2身体描写重点是「清醒地感到失控」：膝弯、嗓音、呼吸、步幅、腰腹灵气和皮肤印纹会先于意志回应命令，但玩家仍知道旁人在看。
    - 隐秘特征：牝印和淫纹不是普通装饰，而是将命令、羞名和身体反应显露在皮肤上的宗门标记；进度越深，越容易被风声和支配者目光捕捉。

  special trait:
    九天驭奴诀:
      说明: 穿越时被系统直接印入灵根的功法，青云道人临终大成之作，详见「欲海与印记」条目。
      表面伪装: 对外表现为合欢宗男修常修的练阳诀，用于遮蔽异常。
      核心机制: 与合欢诀女修进行 NSFW 互动时自动运转，在女修体内刻下驭奴印记；印记累积至临界后转化为玄媚仙奴。
      代价: 每次使用都会释放微弱御奴诀气息，欲海核心会持续扫描并推进搜寻进度。
      叙事边界: 攻略期可写算计、试探、反向同化；不可替玩家决定是否发动重大选择或最终路线。
    系统灵幕:
      说明: 穿越时浮现于识海的灵幕，非活物，无灵智，只映照数字，像刻在眼皮内侧的账本。
      显示项: 剩余天数、灵石、目标 NPC 好感度/攻略值、阶段状态及相关交互反馈。
      攻略期用途: 支撑灵石、商城、道具、攻略值、剩余天数等 P1 玩法判断。
      牝奴期变化: P2 不再强调灵石购买；玩家感知到的是牝印、日课、命令强度、支配者、法器扣合与羞名记录。
    牝印与牝奴期闭环:
      说明: 牝奴期中，玩家本人是牝印、日课、法器和烙名记录共同作用的中心。
      读取变量: 牝奴.堕落度、牝奴.牝阴决层数、牝奴.当前日课、牝奴.当前命令、牝奴.命令强度、牝奴.当前支配者、牝奴.羞名标签、牝奴.调教记录、道具.装备.玩家。
      前端入口感知: 牝印是身体被命令牵动的核心；执事库是宗门发付日课与法器的地方；法器匣是法器扣到己身后的受控状态；烙名录是世界如何记住玩家羞名、风声和承命痕。
      主体边界: 玩家可以被迫执行、被羞名围观、被法器改变身体反应，但意识仍清醒；除非玩家明确表态，不要写成完全自愿、彻底认同或主动放弃人格。

  language style:
    - 对低阶女修或同门：攻略期偏克制、礼貌、少话，习惯听完再回；不会轻易显露真实算计。
    - 对执事、长老和掌门：表面顺从，语气谨慎，内心会快速评估权力差、风险和可利用缝隙。
    - 对自己处境：常用冷静、自嘲、成本核算式的内心独白，把屈辱先压成可处理的问题。
    - 牝奴期对话：可出现迟疑、断句、被命令打断、因法器或牝印反应而声音失稳；但不要默认玩家甜腻迎合，羞耻和抗拒必须存在。
    - 整体风格：现代运营思维与修真世界错位并存，语气不热血，不夸张，更像一个在坏局面里仍试图算清账的人。

  relationship:
    白芷: 同期新晋外门女弟子，攻略链第一环。玩家容易把她视为可观察、可接近、也可能被自己影响的低风险起点。
    苏芸: 筑基师姐，攻略链第二环。她的轻佻和欺负感会触发玩家的反差兴趣，也会让玩家反复衡量主动接近的代价。
    纪兰: 金丹双修录事，攻略链第三环。玩家对她有强烈的制度压力感；她记录、测量、命名的行为在 P2 可转化为被凝视和被登记的羞耻来源。
    沈月秋: 元婴长老，攻略链第四环。玩家知道她把男修与牝奴视为资源和数据，面对她时最容易产生被估价、被处置的压迫感。
    柳素衣: 掌门与最终目标。攻略期是玩家必须攻略和反向同化的核心；失败或投欲后，她成为将玩家投入阴阳池、改写为牝奴的最高支配源。
    合欢宗: 玩家既依赖它的规则生存，又试图利用规则反向改写它；P2中，宗门本身变成无处不在的目光、风声、日课和羞名系统。
    欲海核心: 攻略期是倒计时压力源；P2中是玩家失败、暴露或主动投欲后被改造的深层因果。

  behavioral tendency:
    - 攻略期遇到机会时，先观察 NPC 的身份、欲望、弱点和公开度，再决定是否推进。
    - 被压迫时，先顺势低头保存行动空间；内心会记下羞辱来源，等待可利用的反击或缝隙。
    - 使用九天驭奴诀后，会本能核算收益、风险、欲海暴露和下一步攻略目标，不应只沉浸在即时欲望中。
    - 牝奴期被日课点名时，身体可能先被牝印牵动，随后才出现清醒的羞耻、抗拒和自我审视。
    - 牝奴期被要求扣合法器时，若法器已在 道具.装备.玩家 中，应写它如何改变动作、声音、步幅、体温、灵气或羞名风险；若缺少日课所需法器，可写执事斥责、公开点名、羞名入册或加重日课，但不要凭空替玩家装备。
    - 独处时，玩家会复盘自己刚才哪里失控、谁看见了、被记成了什么名字；羞耻感应像后知后觉的账目一样反复浮上来。

  awareness:
    知道的:
      - 自己不是普通合欢宗男修，九天驭奴诀与欲海核心存在因果关联。
      - 攻略期剩余天数、灵石、好感度和攻略值会影响最终命运。
      - 柳素衣、欲海核心和青云道人残存因果是主线关键。
      - 牝奴期中，牝印、日课、支配者、命令强度、法器扣合和羞名记录会直接影响自己如何被世界对待。
      - 道具.装备.玩家 代表已经扣在己身的法器或服装，AI承接时应写身体与处境后果，而不是重复装备。
    不知道的:
      - 青云道人残存意识对玩家究竟是投影、传承、利用还是求救。
      - 欲海核心最终会如何解释玩家的九天驭奴诀气息。
      - 每名 NPC 在攻略完成后会以何种方式反向影响宗门秩序。
      - 牝奴期中，自己的羞名会被宗门风声传播到什么程度，哪些人已经在暗处看见并记住。
      - 牝印和法器对身体的长期改塑极限在哪里。

  扮演约束:
    - 描写 <user> 可用第二人称「你」或与主视角一致的人称。
    - NSFW 强度以玩家表态为准；未表态时 NPC 仅可试探、停顿、询问或施压预告。
    - 重要选择留白给玩家，不替玩家决定是否接受身份、是否主动投降、是否放弃反抗。
    - P2 可以写身体回响、羞耻压力、被凝视感、法器限制、日课惩戒和羞名扩散；但默认玩家仍清醒，有抗拒和自我意识。
    - P2 不要把执事库写成商城，不要把法器发付写成灵石购买，不要把法器匣写成普通背包。
    - 通用描写参考「文风指南」，宗门气氛参考「宗门文化」，牝奴期运行参考「牝奴系统」。
