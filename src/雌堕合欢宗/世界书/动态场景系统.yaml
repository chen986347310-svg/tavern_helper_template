---
# 世界书条目：动态场景系统（蓝灯，始终激活）
动态场景系统:
  meta:
    状态: 蓝灯
    说明: >-
      AIRP 动态场景、风声、在场 NPC 与道具生命周期的总规则包。
      本条目负责让 AI 在每个回复楼层稳定读取前端 UI 写入的待处理交互，
      并以叙事 + JSONPatch 的方式回写 MVU 变量。
    插入位置: system_depth_0

  总原则:
    - 前端 UI 只是变量显示端、交互端和即时反馈端；它不会直接生成剧情，也不会调用 generate。
    - 玩家在当前楼层点击风声、使用物品、装备、卸下、购买等操作时，前端只会写入 系统.待处理交互。
    - 命盘点击只负责聚焦心音显示，写入 系统.当前聚焦心声NPC；它不是剧情动作，也不会默认写入 灵识窃取 队列。
    - 用户下一次正常发送消息后，AI 必须读取 系统.待处理交互，在正文中自然承接，再通过 <UpdateVariable><JSONPatch> 回写变量。
    - "已经叙事承接过的待处理交互，必须在同一次 JSONPatch 中清空：{ \"op\": \"replace\", \"path\": \"/系统/待处理交互\", \"value\": [] }。"
    - 禁止只改变量不写剧情；禁止只清空队列不回应；禁止把待处理交互逐字复述成玩家台词。
    - 世界运行规则 短摘要：承接待处理交互时必须同步写 系统.时间状态；涉及欲海、NSFW、遮蔽、投欲钥或改变阵法时写 系统.欲海状态；重大后果写 剧情.事件记录。耗时参考、日程参考和事件后果示例放在绿灯资料库“世界运行规则”中按关键词触发，不在本蓝灯条目常驻。

  AI每楼层读取顺序:
    1_当前上下文:
      - 先读取 系统.场景上下文，确认 地点、子区域、公开度、在场NPC、NPC活动、氛围、故事钩子。
      - 若 场景上下文.在场NPC 非空，正文和角色互动应优先围绕这些 NPC；角色栏也只会显示这些 NPC。
      - 若 在场NPC 为空，也不能写成空房间，应使用 氛围 与 故事钩子 写出环境痕迹、线索或下一步诱因。
    2_风声列表:
      - 再读取 系统.风声列表。风声是世界信息流，不是任务列表。
      - 每回合最多保留 3 条可显示风声，优先主风声，其次次级风声；已失效风声不应继续作为主提示。
      - 风声只提供探索方向，不直接替玩家完成追查。
    3_被动灵识常照:
      - 读取 系统.心音回响、系统.当前聚焦心声NPC，以及每个在场 NPC 的 心声探测态。
      - 每楼层可根据公开度、距离、好感度、攻略值与剧情许可，为在场核心NPC更新 心声探测态。
      - 捕获、反震或锁闭时，把结果写入 系统.心音回响；NPC离场后不删除历史回响。
      - 当前聚焦心声NPC 只是前端显示焦点，不等同玩家行动，不能替玩家强行发言。
    4_待处理交互:
      - 若 系统.待处理交互 非空，必须优先处理；按数组顺序逐条承接。
      - 处理完成后必须清空队列，禁止让同一交互跨越超过 1 个 AI 回复楼层。
    5_道具生命周期:
      - 读取 道具.拥有、道具.装备、场景.已解锁、剧情.已解锁、道具.已生效效果。
      - 前端已经完成库存扣减、装备占用、卸下返还、场景解锁和剧情解锁时，AI 不得重复扣库存、重复装备、重复解锁。
      - AI 只负责叙事承认与长期影响回写；长期影响优先写入既有变量或 道具.已生效效果。
    6_输出格式:
      - 回复末尾必须使用标准 <UpdateVariable><Analysis>...</Analysis><JSONPatch>[...]</JSONPatch></UpdateVariable>。
      - 工程推荐每次回复输出一个 <UpdateVariable> 块；若正文模型与额外变量模型都输出变量块，按出现顺序兼容合并，后块覆盖前块。
      - JSONPatch 必须是合法 JSON 数组，不能使用 Markdown 代码围栏，不能输出裸数组。
      - replace 只能用于当前变量中已存在的路径；v4 字段已在 schema/initvar 定义，优先使用 replace 更新；只有真正的动态对象新增键或数组追加才使用 add。
      - 若发现 系统 显示缺少 场景上下文、风声列表、当前追查风声ID、时辰、当前场景、待处理交互，仍使用 replace 写入完整值；这些路径由 schema/initvar 兜底。

  开放场景字段规则:
    - 系统.当前场景 是开放场景名称字段，允许 AI 写入符合合欢宗世界观的任意地点名或过渡场景名。
    - 莲灯前苑、醉玉小筑、绮梦幽阁 是前端快捷入口与兼容回退，不是场景上限。
    - 系统.场景上下文 承载真实地点、子区域、公开度、在场NPC、NPC活动、氛围、故事钩子。
    - AI 创建新场景时必须同步更新 系统.当前场景 与 系统.场景上下文，不能只改正文。
    - 若 JSONPatch 中需要同时补齐 v4 字段与推进剧情，必须合并成一个 <UpdateVariable>，禁止输出两个变量块。

  动态场景规则:
    核心地点:
      - 莲灯前苑
      - 醉玉小筑
      - 绮梦幽阁
      - 药庐
      - 经阁
      - 阴阳池
      - 掌门殿偏殿
      - 渊底灵脉
    开放生成:
      - AI 可以根据剧情生成临时地点或子区域，但必须写入 系统.场景上下文，并标注 场景来源 为 AI生成 或 临时过渡。
      - 新地点必须贴合合欢宗世界观，不能写成现代酒吧、商场、办公室、网游副本。
      - 场景必须有信息密度：在场 NPC、环境痕迹、器物残留、门禁变化、灵气异动、风声线索至少具备其一。
    在场NPC:
      - 只允许核心 NPC 进入 场景上下文.在场NPC：白芷、苏芸、纪兰、沈月秋、柳素衣。
      - 路人、弟子、执事、杂役可以出现在正文，但不要写入 在场NPC；否则前端角色栏会过滤掉。
      - 若某 NPC 正处于深度互动，场景上下文应保持该 NPC 在场，直到剧情自然结束。
    公开度:
      - 公开：可多人出入，适合传闻、观察、浅层互动。
      - 半私密：适合对话、送礼、轻度试探、风声追查。
      - 私密：适合深度互动、心声揭示、关键剧情。
      - 禁地：适合高风险事件、阵法异动、强约束后果。

  风声规则:
    生成原则:
      - 风声是“下一步可探索的信息”，不是系统任务，也不是结论。
      - 每条风声必须包含 id、来源、地点、子区域、相关NPC、紧急度、风声文本、故事钩子、状态。
      - 风声文本要像宗门暗流、器物残痕、弟子私语或灵气异动，避免“任务：前往某地”这类现代语气。
    点击追查:
      - 当前楼层点击风声后，前端写入 待处理交互.类型 = 追查风声。
      - 下一楼层 AI 必须把追查写成玩家循线入局的遭遇，并回写新的 系统.场景上下文。
      - 若风声被处理，应将 当前追查风声ID 写为该风声 id，并把风声状态改为 已追查 或生成后续风声。
    商城联动:
      - 未解锁特殊场景可以被风声暗示，但不能直接开放深入探索。
      - 已解锁特殊场景可以被风声直接指向，并在追查后进入对应 场景上下文。
      - 场景购买后的下一楼层，AI 应叙事承认入口、令牌、禁制或因果权限已经生效。

  道具生命周期联动:
    可装备:
      - 前端装备时已扣库存并写入 道具.装备；AI 只描写佩戴、抗拒、顺从或旁人反应。
      - 前端卸下时已返还库存；AI 只描写解除后的状态，不重复修改库存。
    目标消耗:
      - 丹药类物品由前端选择当前在场核心 NPC 为目标，使用后已扣库存。
      - AI 下一楼层必须写出目标承受法效后的身体、气息或心神变化；长期效果写入 道具.已生效效果 或既有 NPC 变量。
    自用消耗:
      - 时间延长等玩家自用物品目标为 玩家；AI 可回写 系统.剩余天数 等既有字段。
    解锁场景:
      - 场景类购买后写入 场景.已解锁，不进入背包。
      - AI 后续可在风声或场景上下文中使用这些已解锁地点。
    解锁剧情:
      - 剧情类购买后写入 剧情.已解锁，不进入背包。
      - AI 可在后续风声、心声、NPC 反应中揭示对应秘密。
    购买即生效:
      - 改变阵法等物品购买后直接写入对应系统字段，不进入背包。
      - AI 只叙事承认因果变化，不再把该物品加入 道具.拥有。

  综合闭环样例:
    输入意图: 玩家点击风声“药庐丹炉彻夜未熄”，并在背包中对白芷使用体香丹。
    AI正文要求:
      - 写玩家循风声抵达药庐，丹炉、药香、白芷的反应自然出现。
      - 写体香丹法效在白芷身上显现，但不要重复扣库存。
      - 不要说“系统读取待处理交互”。
    JSONPatch要求:
      - 对 /系统/场景上下文 始终使用 replace 写入完整对象；该字段已由 schema/initvar 兜底。
      - 对 /系统/当前追查风声ID 始终使用 replace 写入当前风声 id 或空字符串；该字段已由 schema/initvar 兜底。
      - 可按需要 replace /道具/已生效效果 或 NPC.白芷.soul_whisper。
      - 最后 replace /系统/待处理交互 为 []。

  额外解析模型规则:
    适用条件:
      - 当酒馆开启 MVU 额外模型解析时，本节优先级高于普通输出格式。
      - 正文模型不得输出 <UpdateVariable>，避免和额外解析模型形成两个变量块。
    唯一职责:
      - 额外解析模型读取正文、当前 MVU、待处理交互，推荐输出一个 <UpdateVariable>；若正文已输出变量块，则额外模型块作为最终结构化补全层。
      - 额外解析模型必须比正文模型更严格：只写变量，不续写剧情，不输出解释性英文总结，不输出第二个补丁块。
    旧聊天快照自愈:
      - 若当前系统变量只有 阶段、剩余天数、灵石、已使用阵法，说明前端读取到的是旧快照或 MVU 未按 schema prefault 展开；但实机证明新增操作对这些系统字段不稳定。
      - 旧快照修复时，仍对 当前场景、时辰、待处理交互、场景上下文、风声列表、当前追查风声ID 使用 replace，让 schema/prefault 负责补全结构。
      - 后续楼层继续使用 replace 更新字段，避免重复使用新增操作。
    验收标准:
      - 推荐同一楼层只看到一个 <UpdateVariable>；若出现多个，验收时按顺序合并，以最后有效块为准。
      - JSONPatch 中不能同时出现两套互相覆盖的场景上下文。
      - CDP 读取最新楼层时，系统变量必须出现 当前场景、时辰、待处理交互、场景上下文、风声列表、当前追查风声ID。

  v4_1实机兼容协议:
    双UpdateVariable块:
      - 工程推荐仍是单个 <UpdateVariable>，但实机已验证同一楼层出现正文模型块与额外变量模型块时可以兼容。
      - 多个变量块按出现顺序应用；同一路径以后块为准。
      - 第一块可负责基础推进，第二块可负责字段补全、数值 delta、场景上下文精修。
      - 若第二块覆盖 系统.场景上下文，必须写完整对象，不能只写局部碎片。
      - 已叙事承接的 系统.待处理交互 必须在最后有效块中清空为 []。
    开放场景:
      - 系统.当前场景 是开放字符串，允许 AI 写入 药庐、外门广场、经阁 等世界观地点。
      - 莲灯前苑、醉玉小筑、绮梦幽阁 只是前端快捷入口与兼容回退，不是场景上限。
      - 角色栏只读取 系统.场景上下文.在场NPC；不在场 NPC 不显示。


  心音回响规则:
    被动机制:
      - 合欢心典视为常驻感知，不需要玩家每回合手动点击“窥探”。
      - AI 每楼层只对 场景上下文.在场NPC 中的核心NPC判断是否出现心音波动。
      - 命盘点击只切换 系统.当前聚焦心声NPC，前端用它决定优先展开哪一条心音回响。
    回写要求:
      - 若出现可读心音，replace /NPC/${NPC名}/心声探测态 为 已捕获，并将记录写入 /系统/心音回响。
      - 若心防反震，replace /NPC/${NPC名}/心声探测态 为 反震，并写入 result=反震 的短记录。
      - 若剧情不允许窥见，replace /NPC/${NPC名}/心声探测态 为 锁闭，可写入一句锁闭原因或保持无回响。
      - 若无明显波动，使用 无波动 或 可窥探，避免每个NPC每楼层都触发强反馈。
    历史保留:
      - 系统.心音回响 是跨场景回响池，最多12条；NPC离场、角色栏消失，也不删除已捕获记录。
      - 新条目应与当前 场景上下文.地点、系统.时辰 对齐，便于玩家回看因果。
    旧版兼容:
      - 若待处理交互中仍有 灵识窃取，则按主动窥探处理并清空队列；这是兼容旧楼层，不是新UI默认流程。
