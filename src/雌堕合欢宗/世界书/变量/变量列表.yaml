---
变量列表:
  系统:
    阶段: '"攻略期" | "牝奴期"'
    剩余天数: number (0~30)
    灵石: number
    已使用阵法: boolean
    时辰: '"晨时" | "午时" | "酉时" | "亥时"'
    时间状态:
      当前日: number (>=1)
      时段进度: number (0~3，晨时/午时/酉时/亥时对应序位)
      最近耗时: string  # 最近一次事件消耗的时间描述
      最近结算原因: string  # 最近一次时间变化的原因
      最近事件类型: string  # 对话/扫地/追查风声/NSFW/特殊道具等
      是否过夜: boolean
    欲海状态:
      搜寻进度: number (0~100)
      警戒等级: '"平静" | "微动" | "警觉" | "锁定" | "已改写"'
      遮蔽剩余时段: number
      遮蔽来源: string
      最近暴露原因: string
      已被定位: boolean
  牝奴:
    堕落度: number (0~100)
    牝阴决层数: number (0~9)
    入场日: number
    当前日课: string
    当前支配者: '"" | "白芷" | "苏芸" | "纪兰" | "沈月秋" | "柳素衣"'
    当前命令: string
    命令强度: number (0~100)
    今日调教次数: number (0~99)
    待执行日课: string[]
    最近调教结算: string
    羞名标签: string[]
    调教记录:
      - id: string
        时辰: '"晨时" | "午时" | "酉时" | "亥时"'
        支配者: string
        摘要: string
        羞名等级: '"微闻" | "传开" | "挂牌" | "示众" | "烙名"'
    上次支配者: string
    支配次数: '{ 白芷/苏芸/纪兰/沈月秋/柳素衣: number }'
    情欲控制阶段: number (1~3)
    改造进度: { 泌乳/肛门/憋尿: boolean }
  NPC:
    白芷/苏芸/纪兰/沈月秋/柳素衣:
      好感度: number (0~100)
      攻略值: number (0~100)
      粘滞计数: number
      状态: '"未开始" | "进行中" | "已完成"'
  道具:
    拥有: '{ [道具名]: number }'
    装备: '{ 玩家/白芷/苏芸/纪兰/沈月秋/柳素衣: string[] }'
    已生效效果:
      - 目标: string
        道具: string
        来源交互ID: string
        生效楼层: number
        效果标签: string[]
        可被AI覆盖: boolean
  场景: '{ 已解锁: string[] }'
  剧情:
    已解锁: string[]
    线索状态:
      '{ [剧情线/场景名/特殊事件名] }':
        类型: '"剧情钥匙" | "场景令牌" | "特殊事件"'
        状态: '"可追查" | "追查中" | "已触发" | "已失效"'
        风声ID: string
        关联名称: string
        关联NPC: string
        推荐场景: string[]
        触发次数: number
        最近场景: string
    事件记录:
      - id: string
        类型: string
        摘要: string
        日: number
        时辰: '"晨时" | "午时" | "酉时" | "亥时"'
        地点: string
        涉及NPC: string[]
        公开度: '"公开" | "半私密" | "私密" | "禁地"'
        后果标签: string[]
        已生成风声: boolean

# UI交互闭环变量（前端写入，AI下一楼层读取）
# 注意：前端不直接触发AI回复，只追加待处理交互；AI回复后必须清空已处理项。
补充变量:
  系统:
    当前场景: string  # 开放场景名；莲灯前苑/醉玉小筑/绮梦幽阁仅为快捷入口与回退
    待处理交互:
      - 类型: '"装备" | "卸下" | "购买" | "灵识窃取" | "装备道具" | "购买物品" | "使用物品" | "追查风声"'
        目标: string
        道具: string
        数量: number
        时辰: '"晨时" | "午时" | "酉时" | "亥时"'
        场景: string  # 开放场景名；由当前 AI 场景上下文决定
        地点: string
        子区域: string
        风声ID: string
        故事钩子: string
        在场NPC: string[]
        道具显示名: string  # 可选叙事辅助；存档主键仍以“道具”为准
        器阶: string  # 禁器器阶，可为空
        作用部位: string  # 禁器作用部位，可为空
        丹药分类: string  # 丹药叙事辅助；临时丹药/永久丹药/仙奴丹，可为空
        作用线: string  # 丹药叙事辅助；体态/生理/思维/命契等，可为空
        剧情线: string  # 剧情钥匙叙事辅助，可为空
        关联NPC: string  # 剧情钥匙关联NPC，可为空
        秘密主题: string  # 剧情钥匙秘密主题，可为空
        入口类型: '"" | "剧情钥匙" | "场景令牌" | "特殊事件"'
        线索ID: string  # 对应风声ID或叙事入口ID，可为空
        AI短提示: string  # 前端短摘要，可为空；用于下一楼层自然承接
    场景上下文:
      地点: string
      子区域: string
      场景来源: '"核心地点" | "世界书扩展" | "AI生成" | "临时过渡"'
      公开度: '"公开" | "半私密" | "私密" | "禁地"'
      在场NPC: string[]
      NPC活动: '{ [NPC名]: string }'
      氛围: string[]
      故事钩子: string[]
      特殊事件: string
    风声列表:
      - id: string
        来源: '"弟子传闻" | "灵气异动" | "器物残痕" | "NPC行踪" | "宗门告示" | "梦兆" | "剧情钥匙" | "场景令牌" | "特殊事件" | "牝奴日课" | "牝印命令" | "调教余波" | "宗门闲谈" | "公开示众" | "支配者传唤"'
        地点: string
        子区域: string
        相关NPC: string[]
        紧急度: '"低" | "中" | "高"'
        风声文本: string
        故事钩子: string
        状态: '"未读" | "已读" | "已追查" | "已失效"'
        凝视来源: string
        羞名等级: '"微闻" | "传开" | "挂牌" | "示众" | "烙名"'
        羞名标签: string[]
        反噬日课: string
        是否可承接: boolean
    当前追查风声ID: string
    心音回响:
      - id: string
        npc: '"白芷" | "苏芸" | "纪兰" | "沈月秋" | "柳素衣"'
        text: string
        stage: '"警戒" | "动摇" | "沉沦"'
        result: '"捕获" | "反震" | "锁闭"'
        scene: string
        time: '"晨时" | "午时" | "酉时" | "亥时"'
        floor: number
        is_new: boolean
    当前聚焦心声NPC: string
  NPC.${NPC名}:
    当前场景: string  # 开放场景名；莲灯前苑/醉玉小筑/绮梦幽阁仅为快捷入口与回退
    soul_whisper:
      text: string
      stage: '"警戒" | "动摇" | "沉沦"'
      is_revealed: boolean
    心声探测态: '"无波动" | "可窥探" | "已捕获" | "反震" | "锁闭"'
