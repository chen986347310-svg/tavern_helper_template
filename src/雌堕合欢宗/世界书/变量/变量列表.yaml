---
变量列表:
  系统:
    阶段: "攻略期" | "牝奴期"
    剩余天数: number (0~30)
    灵石: number
    已使用阵法: boolean
  牝奴:
    堕落度: number (0~100)
    牝阴决层数: number (0~9)
    上次支配者: string
    支配次数: { 白芷/苏芸/纪兰/沈月秋/柳素衣: number }
    改造进度: { 泌乳/肛门/憋尿: boolean }
  NPC:
    白芷/苏芸/纪兰/沈月秋/柳素衣:
      好感度: number (0~100)
      攻略值: number (0~100)
      粘滞计数: number
      状态: "未开始" | "进行中" | "已完成"
  道具:
    拥有: { [道具名]: number }
    装备: { 玩家/白芷/苏芸/纪兰/沈月秋/柳素衣: string[] }
  场景: { 已解锁: string[] }
  剧情: { 已解锁: string[] }
