---
变量列表:
  系统:
    阶段: "攻略期" | "牝奴期"
    剩余天数: number (0~30)
    灵石: number
    已使用阵法: boolean
    时辰: "晨时" | "午时" | "酉时" | "亥时"
  牝奴:
    堕落度: number (0~100)
    牝阴决层数: number (0~9)
    上次支配者: string
    支配次数: { 白芷/苏芸/纪兰/沈月秋/柳素衣: number }
    情欲控制阶段: number (1~3)
    改造进度: { 泌乳/肛门/憋尿: boolean }
  NPC:
    白芷/苏芸/纪兰/沈月秋/柳素衣:
      好感度: number (0~100)
      攻略值: number (0~100)
      粘滞计数: number
      状态: "未开始" | "进行中" | "已完成"
  道具:
    拥有: { [道具名]: number }
    装备: { 玩家/白芷/苏芸/纪兰/沈月秋/柳素衣: string[] }
  场景: { 已解锁: string[] }
  剧情: { 已解锁: string[] }

# UI交互闭环变量（前端写入，AI下一楼层读取）
# 注意：前端不直接触发AI回复，只追加待处理交互；AI回复后必须清空已处理项。
补充变量:
  系统:
    当前场景: "莲灯前苑" | "醉玉小筑" | "绮梦幽阁"
    待处理交互:
      - 类型: "装备" | "卸下" | "购买" | "灵识窃取" | "装备道具" | "购买物品" | "使用物品"
        目标: string
        道具: string
        数量: number
        时辰: "晨时" | "午时" | "酉时" | "亥时"
        场景: "莲灯前苑" | "醉玉小筑" | "绮梦幽阁"
  NPC.${NPC名}:
    当前场景: "莲灯前苑" | "醉玉小筑" | "绮梦幽阁"
    soul_whisper:
      text: string
      stage: "警戒" | "动摇" | "沉沦"
      is_revealed: boolean