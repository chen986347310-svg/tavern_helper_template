---
变量输出格式:
  rule:
    - you must output the update analysis and the actual update commands at once in the end of the next reply
    - the update commands works like the **JSON Patch (RFC 6902)** standard, must be a valid JSON array containing operation objects, but supports the following operations instead:
      - replace: replace the value of existing paths
      - delta: update the value of existing number paths by a delta value
      - insert: insert new items into an object or array (using `-` as array index intends appending to the end)
      - remove
      - move
    - don't update field names starts with `_` as they are readonly, such as `_变量`
  format: |-
    <UpdateVariable>
    <Analysis>$(IN ENGLISH, no more than 80 words)
    - ${calculate time passed: ...}
    - ${decide whether dramatic updates are allowed as it's in a special case or the time passed is more than usual: yes/no}
    - ${analyze every variable based on its corresponding `check`, according only to current reply instead of previous plots: ...}
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "${/path/to/variable}", "value": "${new_value}" },
      { "op": "delta", "path": "${/path/to/number/variable}", "value": "${positive_or_negative_delta}" },
      { "op": "insert", "path": "${/path/to/object/new_key}", "value": "${new_value}" },
      { "op": "insert", "path": "${/path/to/array/-}", "value": "${new_value}" },
      { "op": "remove", "path": "${/path/to/object/key}" },
      { "op": "remove", "path": "${/path/to/array/0}" },
      { "op": "move", "from": "${/path/to/variable}", "to": "${/path/to/another/path}" },
      ...
    ]
    </JSONPatch>
    </UpdateVariable>

待处理交互清空格式:
  rule:
    - if 系统.待处理交互 is not empty and the reply has narrated those interactions, the same JSONPatch must clear it
    - the same JSONPatch must also write 系统.时间状态; clearing the queue without time settlement is invalid
    - if the interaction touches NSFW, desire sea, 欲海遮蔽符, 投欲钥, or 改变阵法, the same JSONPatch must write 系统.欲海状态
    - if the interaction creates lasting consequence, append one record to 剧情.事件记录
    - preferred patch is exactly: { "op": "replace", "path": "/系统/待处理交互", "value": [] }
    - do not clear 系统.待处理交互 before narrating the interaction result
  example: |-
    <UpdateVariable>
    <Analysis>Handled pending UI interactions, settled world time, recorded consequences, and cleared queue.</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/系统/时间状态", "value": { "当前日": 1, "时段进度": 1, "最近耗时": "一个时辰", "最近结算原因": "追查风声推进一个时段", "最近事件类型": "追查风声", "是否过夜": false } },
      { "op": "insert", "path": "/剧情/事件记录/-", "value": { "id": "event_1_午时_追查风声", "类型": "追查风声", "摘要": "玩家循风声进入听风廊追查旧誓余波。", "日": 1, "时辰": "午时", "地点": "听风廊", "涉及NPC": ["白芷"], "公开度": "半私密", "后果标签": ["风声追查"], "已生成风声": false } },
      { "op": "replace", "path": "/系统/待处理交互", "value": [] }
    ]
    </JSONPatch>
    </UpdateVariable>

世界运行核心输出格式:
  purpose: "用于约束AI在承接待处理交互后，同步写入时间状态、欲海状态与事件后果账本。"
  required_fields:
    系统.时间状态:
      - 当前日
      - 时段进度
      - 最近耗时
      - 最近结算原因
      - 最近事件类型
      - 是否过夜
    系统.欲海状态:
      - 搜寻进度
      - 警戒等级
      - 遮蔽剩余时段
      - 遮蔽来源
      - 最近暴露原因
      - 已被定位
    剧情.事件记录:
      - id
      - 类型
      - 摘要
      - 日
      - 时辰
      - 地点
      - 涉及NPC
      - 公开度
      - 后果标签
      - 已生成风声
  rule:
    - 有 系统.待处理交互 时，正文承接后必须在同一个 <JSONPatch> 中 replace /系统/时间状态。
    - 若涉及 NSFW、欲海遮蔽、投欲钥、改变阵法或欲海暴露，必须 replace /系统/欲海状态。
    - 若事件会影响后续风声、心音、NPC反应或P2日课，必须 insert 到 /剧情/事件记录/-；事件记录最多保留最近20条，必要时 replace 整个 /剧情/事件记录。
    - 禁止只清空队列不写时间结算。
  time_extension_example: |-
    <UpdateVariable>
    <Analysis>Applied time extension, updated remaining days and time state, then cleared queue.</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/系统/剩余天数", "value": 31 },
      { "op": "replace", "path": "/系统/时间状态", "value": { "当前日": 1, "时段进度": 1, "最近耗时": "不耗时", "最近结算原因": "时间延长生效，剩余天数增加", "最近事件类型": "时间延长", "是否过夜": false } },
      { "op": "replace", "path": "/系统/待处理交互", "value": [] }
    ]
    </JSONPatch>
    </UpdateVariable>
  desire_shield_example: |-
    <UpdateVariable>
    <Analysis>Applied desire sea shielding, wrote desire sea status, and cleared queue.</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/系统/时间状态", "value": { "当前日": 1, "时段进度": 1, "最近耗时": "一刻钟内", "最近结算原因": "欲海遮蔽符启用，不推进时辰", "最近事件类型": "欲海遮蔽符", "是否过夜": false } },
      { "op": "replace", "path": "/系统/欲海状态", "value": { "搜寻进度": 0, "警戒等级": "平静", "遮蔽剩余时段": 4, "遮蔽来源": "欲海遮蔽符", "最近暴露原因": "欲海遮蔽符生效", "已被定位": false } },
      { "op": "replace", "path": "/系统/待处理交互", "value": [] }
    ]
    </JSONPatch>
    </UpdateVariable>
旧版灵识窃取下一楼层闭环样例:
  purpose: "用于约束AI在下一楼层承接前端UI交互：先叙事回应，再更新soul_whisper，最后清空待处理交互。"
  input_state_example: |-
    系统:
      时辰: 午时
      当前场景: 醉玉小筑
      待处理交互:
        - 类型: 灵识窃取
          目标: 白芷
          道具: ""
          数量: 1
          时辰: 午时
          场景: 醉玉小筑
    NPC:
      白芷:
        攻略值: 45
        soul_whisper:
          text: ""
          stage: 警戒
          is_revealed: false
  reply_requirement:
    - 正文必须自然描写玩家以合欢心典窥探白芷心绪的结果。
    - 不要说“读取变量”“处理队列”“JSONPatch”等出戏词。
    - 若判定成功，同一次变量更新必须写入 NPC.白芷.soul_whisper，并清空 系统.待处理交互。
    - 若判定失败，也必须叙事回应心防反震或心音破碎，并清空已处理队列；可克制地调整好感度。
  output_example: |-
    <UpdateVariable>
    <Analysis>Handled the pending soul whisper interaction, revealed Baizhi's inner thought, and cleared the processed UI queue.</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/NPC/白芷/soul_whisper/text", "value": "他方才的目光，竟让我道心微乱。" },
      { "op": "replace", "path": "/NPC/白芷/soul_whisper/stage", "value": "动摇" },
      { "op": "replace", "path": "/NPC/白芷/soul_whisper/is_revealed", "value": true },
      { "op": "replace", "path": "/系统/待处理交互", "value": [] }
    ]
    </JSONPatch>
    </UpdateVariable>
使用物品下一楼层闭环样例:
  purpose: "用于约束AI承接前端背包消耗品：先叙事回应法效，再按需要更新变量，最后清空待处理交互。"
  input_state_example: |-
    系统:
      时辰: 午时
      当前场景: 醉玉小筑
      剩余天数: 30
      待处理交互:
        - 类型: 使用物品
          目标: 玩家
          道具: 时间延长
          数量: 1
          时辰: 午时
          场景: 醉玉小筑
  reply_requirement:
    - 正文必须自然描写玩家启用道具后的法效，不要说“读取变量”“处理队列”。
    - 不要重复扣除背包库存；前端已经完成 道具.拥有 的扣减。
    - 若该物品需要变量生效，同一次变量更新必须写入对应变量，并清空 系统.待处理交互。
    - 若只是剧情类法效，也必须在叙事回应后清空已处理队列。
  output_example: |-
    <UpdateVariable>
    <Analysis>Handled the pending item use, applied the time extension effect, and cleared the processed UI queue.</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/系统/剩余天数", "value": 30 },
      { "op": "replace", "path": "/系统/待处理交互", "value": [] }
    ]
    </JSONPatch>
    </UpdateVariable>
