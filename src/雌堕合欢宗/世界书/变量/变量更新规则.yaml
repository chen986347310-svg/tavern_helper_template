---
变量更新规则:
  系统:
    阶段:
      check:
        - 默认为"攻略期"，仅当剩余天数归零时切换为"牝奴期"
    剩余天数:
      type: number
      range: 0~30
      check:
        - 每次时间流逝后用delta减少，消耗时间延长道具时用delta增加
        - 归零时触发Phase 2牝奴期，不再减少
    灵石:
      type: number
      check:
        - 通过NSFW互动获得：灵石增量 = NPC境界系数 × 攻略值增量
        - 境界系数：白芷10 / 苏芸20 / 纪兰40 / 沈月秋60 / 柳素衣100
        - 攻略柳素衣完成时获得1,000,000灵石奖励
        - 购买道具/服装/场景/剧情/时间延长时扣除对应价格
        - 不能为负数
    已使用阵法:
      check:
        - 购买改变阵法道具（500,000灵石）后设为true
        - 设为true后触发GOOD END

  牝奴:
    堕落度:
      type: number
      range: 0~100
      category:
        0~10: 清醒隐忍期
        10~30: 动摇挣扎期
        30~50: 本能屈从期
        50~70: 淫纹发情期
        70~90: 欲壑难填期
        90~100: 彻底雌堕期
      check:
        - 仅在Phase 2牝奴期时更新
        - 通过粘滞触发机制增长：采补3层、羞辱指令2层、寸止/憋尿2层、多人同时1层
        - 只能升不能降
    牝阴决层数:
      type: number
      range: 0~9
      check:
        - 仅在Phase 2牝奴期时更新
        - 通过修炼和采补逐步解锁，不能超过9
    上次支配者:
      check:
        - 记录最近一次支配玩家的NPC姓名
    支配次数:
      type: |-
        {
          [NPC名: string]: number;
        }
      check:
        - 记录每个NPC支配玩家的次数
    改造进度:
      check:
        - 泌乳：第1月深度改造完成后设为true
        - 肛门：第2月深度改造完成后设为true
        - 憋尿：第3月深度改造完成后设为true

  NPC.${NPC名}:
    好感度:
      type: number
      range: 0~100
      check:
        - 通过日常接触（对话、送礼、同修）提升
        - NSFW影响微小
        - 好感度<30时攻略值锁定为0
    攻略值:
      type: number
      range: 0~100
      check:
        - 只通过亲密/NSFW行为提升
        - 攻略值公式：floor(基础值 × 好感度 ÷ 50)
        - 基础值由行为类型决定
        - 攻略值=100时NPC转化为玄媚仙奴
    粘滞计数:
      type: number
      range: 0~99
      check:
        - 亲密接触：累积3层触发攻略值增长，中断归零
        - NSFW行为：累积2层触发攻略值增长，中断归零
    状态:
      check:
        - "未开始"：初始状态
        - "进行中"：开始攻略该NPC
        - "已完成"：攻略值达到100，转化为玄媚仙奴

  道具:
    拥有:
      type: |-
        {
          [道具名: string]: number;
        }
      check:
        - 购买道具时增加对应数量
        - 使用消耗品时减少对应数量
    装备:
      type: |-
        {
          [角色名: string]: string[];
        }
      check:
        - 装备道具时添加到对应角色的数组
        - 解除装备时从数组中移除
        - 好感度门槛：0+/30+/50+/70+/90+

  场景:
    已解锁:
      check:
        - 购买场景后添加到已解锁列表
        - 特殊场景：阴阳池/经阁密室/掌门殿偏殿/渊底灵脉

  剧情:
    已解锁:
      check:
        - 购买特殊剧情后添加到已解锁列表
        - 5NPC各一条，揭示背后秘密
