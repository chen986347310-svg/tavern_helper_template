---
变量更新规则:
  系统:
    阶段:
      check:
        - 默认为"攻略期"，仅当剩余天数归零时切换为"牝奴期"
    剩余天数:
      type: number
      range: 0~30
      check:
        - 【重要】仅在过夜/休息/新的一天开始时用replace减少1
        - 每次对话/交互不减少天数，而是推进时辰
        - 归零时触发Phase 2牝奴期，不再减少
        - 消耗时间延长道具时用replace增加
    时辰:
      type: string
      values: 晨时/午时/酉时/亥时
      check:
        - 一天分为4个时辰：晨时(6-10)→午时(10-14)→酉时(14-18)→亥时(18-22)
        - 每次交互后用replace推进到下一时辰
        - 亥时结束后自动过夜（剩余天数-1），次日重置为晨时
        - 特殊事件（闭关/长途）可消耗多个时辰，用replace跳到对应时辰
        - 4个时辰全部用完后必须过夜，不能继续当天活动
    灵石:
      type: number
      check:
        - 通过NSFW互动获得：灵石增量 = NPC境界系数 × 攻略值增量
        - 境界系数：白芷10 / 苏芸20 / 纪兰40 / 沈月秋60 / 柳素衣100
        - 攻略柳素衣完成时获得1,000,000灵石奖励
        - 购买道具/服装/场景/剧情/时间延长时扣除对应价格
        - 不能为负数
    已使用阵法:
      check:
        - 购买改变阵法道具（500,000灵石）后设为true
        - 设为true后触发GOOD END

  牝奴:
    堕落度:
      type: number
      range: 0~100
      category:
        0~10: 清醒隐忍期
        10~30: 动摇挣扎期
        30~50: 本能屈从期
        50~70: 淫纹发情期
        70~90: 欲壑难填期
        90~100: 彻底雌堕期
      check:
        - 仅在Phase 2牝奴期时更新
        - 通过粘滞触发机制增长：采补3层、羞辱指令2层、寸止/憋尿2层、多人同时1层
        - 只能升不能降
    牝阴决层数:
      type: number
      range: 0~9
      check:
        - 仅在Phase 2牝奴期时更新
        - 通过修炼和采补逐步解锁，不能超过9
    上次支配者:
      check:
        - 记录最近一次支配玩家的NPC姓名
    情欲控制阶段:
      type: number
      range: 1~3
      check:
        - 1=正常压制、2=间歇失控、3=完全沉溺
        - 通过特定NSFW事件触发升级
        - 控制阶段越高，粘滞阈值越低

    支配次数:
      type: |-
        {
          [NPC名: string]: number;
        }
      check:
        - 记录每个NPC支配玩家的次数
    改造进度:
      check:
        - 泌乳：第1月深度改造完成后设为true
        - 肛门：第2月深度改造完成后设为true
        - 憋尿：第3月深度改造完成后设为true

  NPC.${NPC名}:
    好感度:
      type: number
      range: 0~100
      check:
        - 通过日常接触（对话、送礼、同修）提升
        - NSFW影响微小
        - 好感度<30时攻略值锁定为0
        - 【节奏控制】单次交互好感度增量参考：
          - 日常问候/闲聊：+1~3
          - 普通对话/共同活动：+3~5
          - 深入交流/共同经历：+5~8
          - 重要事件/关键转折：+8~12
          - 送礼（根据礼物价值）：+3~15
        - 不要一次交互就让好感度暴涨，需要多天积累
        - 好感度30是攻略值解锁门槛，应需要3-6天的持续互动
    攻略值:
      type: number
      range: 0~100
      check:
        - 只通过亲密/NSFW行为提升
        - 攻略值公式：floor(基础值 × 好感度 ÷ 50)
        - 基础值由行为类型决定（见下方基础值表）
        - 攻略值=100时NPC转化为玄媚仙奴
        - 【基础值参考表】
          - 亲密接触基础值：15~20（拥抱/牵手/亲吻等）
          - NSFW行为基础值：25~35（采补/羞辱/寸止等）
          - 特殊剧情加成：+5~10（关键转折/情感突破）
        - 【节奏预估】好感度30时，NSFW行为每触发一次约+15攻略值
          - 达到100约需7次触发，每次2层NSFW = 14次交互
          - 约3-4天可完成单个NPC攻略值阶段
    粘滞计数:
      type: number
      range: 0~99
      check:
        - 亲密接触：累积3层触发攻略值增长，中断归零
        - NSFW行为：累积2层触发攻略值增长，中断归零
        - 注意：粘滞计数按NPC独立计算，切换NPC不重置
    状态:
      check:
        - "未开始"：初始状态
        - "进行中"：开始攻略该NPC
        - "已完成"：攻略值达到100，转化为玄媚仙奴

  道具:
    拥有:
      type: |-
        {
          [道具名: string]: number;
        }
      check:
        - 购买道具时增加对应数量
        - 使用消耗品时减少对应数量
    装备:
      type: |-
        {
          [角色名: string]: string[];
        }
      check:
        - 装备道具时添加到对应角色的数组
        - 解除装备时从数组中移除
        - 好感度门槛：0+/30+/50+/70+/90+

  场景:
    已解锁:
      check:
        - 购买场景后添加到已解锁列表
        - 特殊场景：阴阳池/经阁密室/掌门殿偏殿/渊底灵脉

  剧情:
    已解锁:
      check:
        - 购买特殊剧情后添加到已解锁列表
        - 5NPC各一条，揭示背后秘密

UI待处理交互闭环:
  核心原则:
    - 前端界面只是变量显示端和交互端，不会也不允许直接触发AI回复。
    - 当前楼层内，玩家点击购买、装备、卸下、使用物品、灵识窃取等UI按钮时，前端只会把事件追加到 系统.待处理交互。
    - 下一楼层由用户正常发送消息触发AI回复；AI必须优先读取 系统.待处理交互，再写剧情与变量更新。
  读取规则:
    - 若 系统.待处理交互 为空数组，则按正常剧情推进。
    - 若 系统.待处理交互 非空，回复开头或正文中必须自然承接这些交互造成的结果，不要说“我读取到了变量”。
    - 必须按数组顺序逐条处理，避免遗漏或颠倒。
    - 每条交互都带有 类型、目标、道具、数量、时辰、场景，叙事必须参考这些字段。
  类型处理:
    购买物品:
      - 表现为玩家已从宗门库藏/商会渠道纳入该物。
      - 若道具具有剧情意义，可补一两句气氛描写，但不要重复扣灵石；前端已完成灵石与拥有数量更新。
    装备道具:
      - 表现为玩家把对应道具施加到目标身上或交予目标佩戴。
      - 可根据目标好感度、当前阶段和道具性质写出顺从、抗拒、羞恼或沉默反应。
      - 不要重复向装备数组插入同一道具；前端已完成装备数据更新。
    卸下:
      - 表现为玩家解除目标身上的对应道具。
      - 不要重复从装备数组移除；前端已完成装备数据更新。
    使用物品:
      - 表现为玩家启用或服下对应道具，使其法效在当前场景中显现。
      - 若道具为时间延长，可叙事为宗门秘法争得余裕；变量层可根据剧情需要用 replace 调整 系统.剩余天数，但不要重复减少背包数量，前端已完成库存扣除。
      - 若道具为丹药，可根据道具效果与目标写出身体/气息/心神变化；若需要落变量，必须使用对应字段，不要凭空新增未定义变量。
      - 使用物品必须在叙事回应后清空已处理队列，禁止只扣库存不写剧情。
    灵识窃取:
      - 表现为玩家以合欢心典窥探目标心绪。
      - 应根据目标NPC的攻略值、当前场景、soul_whisper阶段写出成功窥见、心防反震或心音残片。
      - 成功时可更新 NPC.${目标}.soul_whisper.text、stage、is_revealed。
      - 灵识窃取变量回流标准：text 写入被窥见的心音，stage 使用 警戒/动摇/沉沦，is_revealed 置为 true，前端将在下一楼层变量同步后显示“心音残片”。
      - 失败时可酌情降低目标好感度或写出心神反噬，但必须保持数值变化克制。
  清空规则:
    - 已经在本次AI回复中处理过的交互，必须在同一次 <JSONPatch> 中清空。
    - 推荐使用 { "op": "replace", "path": "/系统/待处理交互", "value": [] }。
    - 禁止让同一条待处理交互跨越超过1个AI回复楼层。
  禁止事项:
    - 禁止在回复中要求前端调用 generate()。
    - 禁止把待处理交互当作玩家口头说出的台词逐字复述。
    - 禁止只清空队列而不叙事回应。
    - 禁止重复执行前端已经完成的数据变化，例如重复扣灵石、重复增加道具、重复插入装备。
