---
变量更新规则:
  系统:
    当前场景:
      type: string
      check:
        - 这是开放场景名称字段，允许写入外门广场、药庐、经阁、阴阳池、醉玉小筑等符合世界观的地点。
        - 莲灯前苑、醉玉小筑、绮梦幽阁只是快捷入口与兼容回退，不是限制。
        - 写入当前场景时，应同步写入 系统.场景上下文，提供地点、子区域、公开度、在场NPC、氛围、故事钩子。
    场景上下文:
      check:
        - 用于承载开放动态场景、在场NPC、氛围、故事钩子。
        - 角色栏只根据 场景上下文.在场NPC 显示核心NPC。
    阶段:
      check:
        - 默认为"攻略期"，仅当剩余天数归零时切换为"牝奴期"
    剩余天数:
      type: number
      range: 0~30
      check:
        - 【重要】仅在过夜/休息/新的一天开始时用replace减少1
        - 每次对话/交互不减少天数，而是推进时辰
        - 归零时触发Phase 2牝奴期，不再减少
        - 消耗时间延长道具时用replace增加
        - 【AI写入红线】玩家进入新聊天时由 initvar/schema 设为 30；AI 不得在首楼层把已经被消耗或被时间延长道具调整过的剩余天数 replace 回 30。
        - 【AI写入红线】若楼层开头读到剩余天数与初始不同，应保留该数值继续推进，不要"修正回"30。
    时辰:
      type: string
      values: 晨时/午时/酉时/亥时
      check:
        - 一天分为4个时辰：晨时(6-10)→午时(10-14)→酉时(14-18)→亥时(18-22)
        - 每次交互后用replace推进到下一时辰
        - 亥时结束后自动过夜（剩余天数-1），次日重置为晨时
        - 特殊事件（闭关/长途）可消耗多个时辰，用replace跳到对应时辰
        - 4个时辰全部用完后必须过夜，不能继续当天活动
    时间状态:
      type: object
      path: 系统.时间状态
      check:
        - 系统.时间状态 是每楼层世界时间结算的结构化凭证，不是装饰字段。
        - 若 系统.待处理交互 非空并已被正文承接，同一次 JSONPatch 必须 replace 系统.时间状态，写明 最近耗时、最近结算原因、最近事件类型、是否过夜。
        - 普通对话可写 最近耗时=一刻钟内，最近结算原因=普通对话不推进时辰，并保持 系统.时辰 不变。
        - 扫地、追查风声、NSFW、特殊事件通常推进一个时辰；跨过亥时时，系统.时辰 置为晨时，系统.剩余天数 减少1，系统.时间状态.是否过夜 置为 true。
        - 使用时间延长时，必须增加系统.剩余天数，并写 系统.时间状态.最近结算原因 说明时间延长生效。
        - 禁止只清空队列不写时间结算。
      fields:
        当前日: number
        时段进度: number
        最近耗时: string
        最近结算原因: string
        最近事件类型: string
        是否过夜: boolean
    欲海状态:
      type: object
      path: 系统.欲海状态
      check:
        - 系统.欲海状态 记录九天驭奴诀与欲海核心对玩家气息的侦测压力。
        - 若事件涉及亲密、NSFW、欲海气息、投欲钥、改变阵法或欲海遮蔽符，必须同步 replace 系统.欲海状态。
        - 普通 NSFW 增加搜寻进度；深度 NSFW 增加更多搜寻进度，并根据进度更新警戒等级。
        - 若 系统.欲海状态.遮蔽剩余时段 大于0，NSFW 不得明显增加搜寻进度，并应减少遮蔽剩余时段。
        - 使用欲海遮蔽符时，必须写入 系统.欲海状态.遮蔽剩余时段 和 遮蔽来源。
        - 使用投欲钥时，必须将搜寻进度推向锁定或已被定位，并承接牝奴期路线。
        - 改变阵法时，必须改写或关闭欲海压力，警戒等级可写为已改写。
      fields:
        搜寻进度: number
        警戒等级: 平静/微动/警觉/锁定/已改写
        遮蔽剩余时段: number
        遮蔽来源: string
        最近暴露原因: string
        已被定位: boolean
    灵石:
      type: number
      check:
        - 初始配给为2000灵石，用于让玩家开局即可购买低阶服装、禁器或丹药。
        - 通过NSFW互动获得：灵石增量 = NPC境界系数 × 攻略值增量 × 4
        - 境界系数：白芷10 / 苏芸20 / 纪兰40 / 沈月秋60 / 柳素衣100
        - NPC攻略值首次到达30/50/70/90/100时，可发放阶段赏赐：800/1500/2500/4000/6000灵石。
        - 追查风声成功时，可根据线索重要性发放300~2000灵石，但不得在前端点击追查时即时发放。
        - 攻略柳素衣完成时获得1,000,000灵石奖励
        - 购买道具/服装/场景/剧情/时间延长时扣除对应价格
        - 不能为负数
        - 【AI写入红线】AI 不得用 replace 把灵石写回初始默认值（如 2000）或任何"清零式"数字；前端已在购买/获得时完成所有日常增减，AI 只在剧情奖励/剧情扣除/调试面板调整后**需要叙事承认**时才用 replace 调整灵石。
        - 【AI写入红线】若玩家通过调试面板调高灵石（例如开局直接 200 万），AI 必须保留该数值，禁止把它"修正回"初始 2000；玩家调试行为也是合法的世界事件。
        - 【AI写入红线】当楼层开头读到 系统.灵石 远大于剧情预期（如开局却已有 100 万+）时，应理解为玩家调试，按调试后的数值继续叙事，绝不要 replace 回低值。
    已使用阵法:
      check:
        - 购买改变阵法道具（500,000灵石）后设为true
        - 设为true后触发GOOD END

  牝奴:
    堕落度:
      type: number
      range: 0~100
      category:
        0~10: 清醒隐忍期
        10~30: 动摇挣扎期
        30~50: 本能屈从期
        50~70: 淫纹发情期
        70~90: 欲壑难填期
        90~100: 彻底雌堕期
      check:
        - 仅在Phase 2牝奴期时更新
        - 通过粘滞触发机制增长：采补3层、羞辱指令2层、寸止/憋尿2层、多人同时1层
        - 只能升不能降
    牝阴决层数:
      type: number
      range: 0~9
      check:
        - 仅在Phase 2牝奴期时更新
        - 通过修炼和采补逐步解锁，不能超过9
    上次支配者:
      check:
        - 记录最近一次支配玩家的NPC姓名
    情欲控制阶段:
      type: number
      range: 1~3
      check:
        - 1=正常压制、2=间歇失控、3=完全沉溺
        - 通过特定NSFW事件触发升级
        - 控制阶段越高，粘滞阈值越低

    支配次数:
      type: |-
        {
          [NPC名: string]: number;
        }
      check:
        - 记录每个NPC支配玩家的次数
    改造进度:
      check:
        - 泌乳：第1月深度改造完成后设为true
        - 肛门：第2月深度改造完成后设为true
        - 憋尿：第3月深度改造完成后设为true

  NPC.${NPC名}:
    好感度:
      type: number
      range: 0~100
      check:
        - 通过日常接触（对话、送礼、同修）提升
        - NSFW影响微小
        - 好感度<30时攻略值锁定为0
        - 【节奏控制】单次交互好感度增量参考：
          - 日常问候/闲聊：+1~3
          - 普通对话/共同活动：+3~5
          - 深入交流/共同经历：+5~8
          - 重要事件/关键转折：+8~12
          - 送礼（根据礼物价值）：+3~15
        - 不要一次交互就让好感度暴涨，需要多天积累
        - 好感度30是攻略值解锁门槛，应需要3-6天的持续互动
        - 【AI写入红线】楼层开头读到的非默认值（包括 0 以外的任何数字）代表玩家先前进度，AI 不得用 replace 把它倒退到 0 或某个固定开局值；只在本楼层确实发生互动时按上面增量做局部 replace。
    攻略值:
      type: number
      range: 0~100
      check:
        - 只通过亲密/NSFW行为提升
        - 攻略值公式：floor(基础值 × 好感度 ÷ 50)
        - 基础值由行为类型决定（见下方基础值表）
        - 攻略值=100时NPC转化为玄媚仙奴
        - 【基础值参考表】
          - 亲密接触基础值：15~20（拥抱/牵手/亲吻等）
          - NSFW行为基础值：25~35（采补/羞辱/寸止等）
          - 特殊剧情加成：+5~10（关键转折/情感突破）
        - 【节奏预估】好感度30时，NSFW行为每触发一次约+15攻略值
          - 达到100约需7次触发，每次2层NSFW = 14次交互
          - 约3-4天可完成单个NPC攻略值阶段
        - 【AI写入红线】楼层开头读到的非默认值代表玩家先前进度，AI 不得用 replace 把它倒退到 0；只在本楼层确实发生 NSFW/亲密行为时按基础值做局部 replace。
    粘滞计数:
      type: number
      range: 0~99
      check:
        - 亲密接触：累积3层触发攻略值增长，中断归零
        - NSFW行为：累积2层触发攻略值增长，中断归零
        - 注意：粘滞计数按NPC独立计算，切换NPC不重置
    状态:
      check:
        - "未开始：初始状态"
        - "进行中：开始攻略该NPC"
        - "已完成：攻略值达到100，转化为玄媚仙奴"
    心声探测态:
      type: string
      values: 无波动/可窥探/已捕获/反震/锁闭
      check:
        - 这是每楼层被动灵识常照的UI状态，不要求前端写入待处理交互。
        - 只对 系统.场景上下文.在场NPC 中的核心NPC主动评估；离场NPC保持上次状态或回落为无波动。
        - 已捕获 表示本楼层可在 系统.心音回响 中出现可读心音；反震 表示窥探失败并给出心境不稳反馈；锁闭 表示目标心防过强或剧情不允许窥见。
        - 状态变化应克制，避免每回合所有NPC都已捕获。

  道具:
    拥有:
      type: |-
        {
          [道具名: string]: number;
        }
      check:
        - 购买道具时增加对应数量
        - 使用消耗品时减少对应数量
        - 【AI写入红线】前端已在购买/使用时完成所有 道具.拥有 的增减，AI 不应主动 replace 整个 道具.拥有 对象，更不应该把它清空或重置回 {}。
        - '【AI写入红线】若必须改动单个道具数量（如剧情消耗、剧情赠予），用 insert 或针对单 key 的 replace，例如 { "op": "replace", "path": "/道具/拥有/欲海遮蔽符", "value": 0 }，绝不动其他 key。'
    装备:
      type: |-
        {
          [角色名: string]: string[];
        }
      check:
        - 装备道具时添加到对应角色的数组
        - 解除装备时从数组中移除
        - 好感度门槛：0+/30+/50+/70+/90+
        - 【AI写入红线】前端已在装备/卸下时完成所有 道具.装备 的增删，AI 不应主动 replace 整个 道具.装备 对象，更不应该把任何角色的装备数组清空回 []。
        - 【AI写入红线】若剧情需要强制脱衣或失装，按单角色单道具针对性 replace，绝不动其他角色。

  场景:
    已解锁:
      check:
        - 购买场景后添加到已解锁列表
        - 特殊场景：阴阳池/经阁密室/掌门殿偏殿/渊底灵脉

  剧情:
    已解锁:
      check:
        - 购买特殊剧情后添加到已解锁列表
        - 5NPC各一条，揭示背后秘密
    线索状态:
      check:
        - 记录剧情钥匙、场景令牌、特殊事件这类叙事入口的生命周期。
        - 类型只能是 剧情钥匙/场景令牌/特殊事件；状态只能是 可追查/追查中/已触发/已失效。
        - 剧情钥匙风声或场景令牌风声被追查并在正文中承接后，应将对应条目状态更新为 已触发，并同步清理或失效对应 系统.风声列表 条目。
        - 购买即生效特殊事件承接后可保持 已触发；不要改成 可追查。
    事件记录:
      type: array
      path: 剧情.事件记录
      check:
        - 剧情.事件记录 是事件后果账本，只记录重大事件或需要后续承接的事件，不记录每句普通闲聊。
        - 当追查风声、特殊道具、NSFW、欲海暴露、剧情钥匙、P2日课或公开事件造成后续影响时，应 insert 到 /剧情/事件记录/- 或 replace 为裁剪后的最近20条。
        - 每条记录必须包含 摘要、日、时辰、地点、涉及NPC、公开度、后果标签。
        - 若事件已经生成 系统.风声列表 余波，已生成风声 置为 true；否则 false。
        - 事件记录不得无限增长，超过20条时 replace 为保留最近20条的完整数组。


MVU补丁操作策略:
  适用范围:
    - 本节是变量更新规则的工程口径，高于普通示例文案。
    - 适用于正文模型直接输出变量块，以及开启 MVU 额外模型解析时的额外解析模型。
  核心结论:
    - 实机验证显示：对 schema.ts / initvar.yaml 已定义的 v4 系统字段，使用 replace 可以稳定落地，insert 不稳定。
    - 因此 系统.当前场景、系统.时辰、系统.待处理交互、系统.场景上下文、系统.风声列表、系统.当前追查风声ID 一律使用 replace 写入完整值。
    - insert 只用于真正的动态新增对象键或数组追加，例如向既有数组末尾追加条目；不要用于上述 v4 系统字段。
  额外模型解析:
    - 若开启 MVU 额外模型解析，推荐正文模型不输出 <UpdateVariable>；若正文已输出变量块，额外解析模型块作为最终结构化裁决层。
    - 推荐同一楼层只输出一个 <UpdateVariable>；若正文模型和额外解析模型双写，按出现顺序兼容合并，后块覆盖前块。
    - 额外解析模型只写变量，不续写剧情，不输出第二个补丁块，不输出英文二次总结块。
  v4字段标准补丁:
    - '{ "op": "replace", "path": "/系统/当前场景", "value": "经阁" }'
    - '{ "op": "replace", "path": "/系统/时辰", "value": "晨时" }'
    - '{ "op": "replace", "path": "/系统/待处理交互", "value": [] }'
    - '{ "op": "replace", "path": "/系统/场景上下文", "value": { "地点": "经阁", "子区域": "外围回廊", "场景来源": "核心地点", "公开度": "半私密", "在场NPC": ["白芷"], "NPC活动": { "白芷": "清扫经阁石柱旁的落叶" }, "氛围": ["清冷墨香"], "故事钩子": ["第一次共事"], "特殊事件": "" } }'
    - '{ "op": "replace", "path": "/系统/风声列表", "value": [] }'
    - '{ "op": "replace", "path": "/系统/当前追查风声ID", "value": "" }'
  验收标准:
    - CDP 读取最新楼层时，系统变量必须包含 当前场景、时辰、待处理交互、场景上下文、风声列表、当前追查风声ID。
    - 若 NPC 字段 replace 成功但系统 v4 字段未出现，优先检查是否仍误用了 insert。
UI待处理交互闭环:
  核心原则:
    - 前端界面只是变量显示端和交互端，不会也不允许直接触发AI回复。
    - 当前楼层内，玩家点击购买、装备、卸下、使用物品、灵识窃取、追查风声等UI按钮时，前端只会把事件追加到 系统.待处理交互。
    - 下一楼层由用户正常发送消息触发AI回复；AI必须优先读取 系统.待处理交互，再写剧情与变量更新。
  读取规则:
    - 若 系统.待处理交互 为空数组，则按正常剧情推进。
    - 若 系统.待处理交互 非空，回复开头或正文中必须自然承接这些交互造成的结果，不要说“我读取到了变量”。
    - 必须按数组顺序逐条处理，避免遗漏或颠倒。
    - 每条交互都带有 类型、目标、道具、数量、时辰、场景；追查风声还会携带 地点、子区域、风声ID、故事钩子、在场NPC，叙事必须参考这些字段。
    - 剧情钥匙/场景令牌购买会额外携带 剧情线、关联NPC、秘密主题、入口类型、线索ID；这些字段是叙事辅助，不是背包主键。
  类型处理:
    购买物品:
      - 【最低承认底线】正文中必须至少有一句承认该道具已经入手或激活，禁止"队列清空了但正文一字未提"。承认形式可以是：动作描写（"她从袖中掏出一枚黯淡的符箓"）、画面（"案上多了一只青铜残钟"）、心声（"指尖摸到刚换来的玉钥，凉得发沉"）等任一即可。
      - 【最低承认底线】这条约束高于"演开场"、"演当前剧情"、"演 NPC 互动"等其他优先级；即使首楼层正在演 NPC 拜访，也必须挤进一句承认。
      - 表现为玩家已从宗门库藏/商会渠道纳入该物。
      - 若道具具有剧情意义，可补一两句气氛描写，但不要重复扣灵石；前端已完成灵石与拥有数量更新。
      - 若道具属于特殊道具（欲海遮蔽符/欲海回声/投欲钥/改变阵法），承接深度按 世界书/道具/特殊道具事件规则 处理。
    装备道具:
      - 表现为玩家把对应道具施加到目标身上或交予目标佩戴。
      - 可根据目标好感度、当前阶段和道具性质写出顺从、抗拒、羞恼或沉默反应。
      - 不要重复向装备数组插入同一道具；前端已完成装备数据更新。
    卸下:
      - 表现为玩家解除目标身上的对应道具。
      - 不要重复从装备数组移除；前端已完成装备数据更新。
    使用物品:
      - 表现为玩家启用或服下对应道具，使其法效在当前场景中显现。
      - 若道具为时间延长，可叙事为宗门秘法争得余裕；变量层可根据剧情需要用 replace 调整 系统.剩余天数，但不要重复减少背包数量，前端已完成库存扣除。
      - 若道具为丹药，可根据道具效果与目标写出身体/气息/心神变化；若需要落变量，必须使用对应字段，不要凭空新增未定义变量。
      - 使用物品必须在叙事回应后清空已处理队列，禁止只扣库存不写剧情。
    追查风声:
      - 表现为玩家循着风声前往对应地点或子区域探查，像推门入局，而不是系统跳转。
      - 必须参考 地点、子区域、风声ID、故事钩子、在场NPC 字段，承接为下一楼层的场景遭遇。
      - 若追查成功，可更新 系统.场景上下文，让角色栏只显示当前在场NPC。
      - 可按剧情需要更新 系统.当前追查风声ID、系统.风声列表，将已处理风声标记为 已追查/已失效 或替换为新的风声。
      - 若被追查风声来源为 剧情钥匙 或 场景令牌，应同步更新 剧情.线索状态 中风声ID匹配的条目：正文已经推进后改为 已触发；若线索中断才改为 已失效。
      - 禁止只改变量不写探索结果；处理后必须清空已处理队列。
    灵识窃取:
      - 表现为玩家以合欢心典窥探目标心绪。
      - 应根据目标NPC的攻略值、当前场景、soul_whisper阶段写出成功窥见、心防反震或心音残片。
      - 成功时可更新 NPC.${目标}.soul_whisper.text、stage、is_revealed。
      - 灵识窃取变量回流标准：text 写入被窥见的心音，stage 使用 警戒/动摇/沉沦，is_revealed 置为 true，前端将在下一楼层变量同步后显示“心音残片”。
      - 失败时可酌情降低目标好感度或写出心神反噬，但必须保持数值变化克制。
  清空规则:
    - 已经在本次AI回复中处理过的交互，必须在同一次 <JSONPatch> 中清空。
    - "推荐使用：{ 'op': 'replace', 'path': '/系统/待处理交互', 'value': [] }。"
    - 禁止让同一条待处理交互跨越超过1个AI回复楼层。
  禁止事项:
    - 禁止在回复中要求前端调用 generate()。
    - 禁止把待处理交互当作玩家口头说出的台词逐字复述。
    - 禁止只清空队列而不叙事回应。
    - 禁止重复执行前端已经完成的数据变化，例如重复扣灵石、重复增加道具、重复插入装备。

道具AI承接闭环:
  适用范围:
    - 服装、禁器、丹药、普通消耗品、特殊道具的购买、装备、卸下、使用承接。
    - 本节只约束下一楼层 AI 如何读取前端已入队动作，不要求前端直接调用 AI。
  主键原则:
    - 系统.待处理交互[].道具 永远是逻辑名，是库存、装备、变量回写的主键。
    - 道具显示名 只用于正文叙事，不得写回 道具.拥有 或 道具.装备。
    - 器阶、作用部位、丹药分类、作用线、剧情线、关联NPC、秘密主题、入口类型、线索ID、AI短提示 都是叙事辅助字段，可为空。
  读取顺序:
    - 先读 系统.待处理交互。
    - 再读 道具.装备、道具.拥有、道具.已生效效果。
    - 再根据 道具显示名、器阶、作用部位、丹药分类、作用线、AI短提示 选择对应叙事重点。
    - 最后按需触发 世界书/道具/服装叙事规则、世界书/道具/禁器叙事规则、世界书/道具/丹药叙事规则。
  类型承接:
    购买物品:
      - 【最低承认底线】正文中必须至少有一句承认该道具已经入手或激活，禁止"队列清空了但正文一字未提"。这条约束高于演开场、演 NPC 拜访、演当前剧情等其他优先级。
      - 正文表现为玩家已获得该物，可写库藏、商会、宗门法阵或药匣交割。
      - 不要重复扣灵石，不要重复增加 道具.拥有；前端已经完成。
    装备道具:
      - 若有 器阶/作用部位，按禁器承接；若有服装显示名或服装世界书命中，按服装承接。
      - 不要重复插入 道具.装备；前端已经完成装备写入。
      - 可根据公开度、在场NPC、目标好感度写羞耻、抗拒、顺从或旁人反应。
    卸下:
      - 正文表现为装备或禁器被解除、残痕退去或身份压力暂时消散。
      - 不要重复从 道具.装备 移除；前端已经完成。
      - 卸下后不得继续写当前效果，除非作为残留痕迹、回忆或风声。
    使用物品:
      - 若有 丹药分类/作用线，按丹药承接；若是时间延长，按普通自用消耗承接。
      - 不要重复扣除 道具.拥有；前端已经完成库存减少。
      - 丹药优先写身体、气息、心神、公开羞耻或命契反应，再决定是否写 道具.已生效效果。
  已生效效果写入建议:
    - 临时丹药可以不写 道具.已生效效果，除非剧情需要跨楼层残留。
    - 永久丹药和仙奴丹若要形成长期痕迹，可 insert 到 /道具/已生效效果/-。
    - 来源交互ID 可为空字符串；效果标签使用短标签，例如 体香、羞耻阈值、命令反应、乳房外显。
  清空规则:
    - 已经叙事承接的交互，必须在同一次 <JSONPatch> 中 replace /系统/待处理交互 为 []。
    - 禁止只清空队列不写剧情。
    - 禁止让同一条待处理交互跨越超过一个 AI 回复楼层。

开放动态场景与双块兼容红线:
  适用范围:
    - 本节是 v4.1 实机验收后的最高工程口径，优先级高于旧的“三场景”或“唯一变量块”建议。
  开放场景:
    - 系统.当前场景 是开放字符串，不是枚举。
    - AI 可以创建符合合欢宗世界观的新场景，例如 药庐、外门广场、经阁、阴阳池、掌门殿偏殿。
    - 莲灯前苑、醉玉小筑、绮梦幽阁只是前端快捷入口、商城解锁入口或旧数据回退锚点，不能限制剧情场景生成。
    - 每次 replace /系统/当前场景 时，必须同步 replace 或 insert /系统/场景上下文。
    - 系统.场景上下文.在场NPC 是角色栏唯一可信数据源；不在该数组内的 NPC 不应显示在角色栏。
    - 若当前楼层没有核心 NPC 在场，在场NPC 必须写为 []，不得省略字段。
  双UpdateVariable兼容:
    - 工程推荐单块输出，但允许正文模型与额外变量模型在同一楼层各输出一个变量块。
    - 多块按出现顺序应用；同一路径冲突时以后块为准。
    - 后块若补全或精修场景上下文，必须写完整 系统.场景上下文 对象。
    - 最后有效块必须清空已承接的 系统.待处理交互。
  待处理交互闭环:
    - AI 回复开头必须检查 系统.待处理交互。
    - 已被剧情承接的交互必须在本楼层 JSONPatch 中清空。
    - '清空方式优先使用 { "op": "replace", "path": "/系统/待处理交互", "value": [] }。'
    - 前端交互只代表玩家意图，不代表结果；结果必须由 AI 叙事和 JSONPatch 决定。
    - 灵识窃取、追查风声、使用物品、装备道具都必须遵守当前楼层暂存、下一楼层结算。


被动灵识常照与心音回响规则:
  适用范围:
    - 本节是 E-UI-10 后的心声系统最高工程口径。
    - 前端命盘点击只负责聚焦显示 系统.当前聚焦心声NPC，不再默认追加 灵识窃取 待处理交互。
  AI每楼层职责:
    - 读取 系统.场景上下文.在场NPC，只对在场核心NPC评估 心声探测态。
    - 根据剧情距离、公开度、NPC心防、好感度、攻略值，决定 无波动/可窥探/已捕获/反震/锁闭。
    - 捕获、反震、锁闭时可写入 系统.心音回响，供前端跨场景展示；NPC离场不删除历史回响。
  心音回响字段:
    - id 使用 echo_ 开头的稳定字符串。
    - npc 必须是 白芷/苏芸/纪兰/沈月秋/柳素衣之一。
    - result 只能是 捕获/反震/锁闭；stage 只能是 警戒/动摇/沉沦。
    - scene 使用当前 系统.场景上下文.地点 或 系统.当前场景；time 使用 系统.时辰。
    - floor 可用0兜底，is_new 对最新条目标 true；旧条目可保留原值或置 false。
    - 数组最多保留最近12条，超出时 replace 为裁剪后的完整数组。
  兼容旧队列:
    - 若 系统.待处理交互 中仍有 类型=灵识窃取，说明旧UI或旧楼层残留；AI应按旧主动窥探承接并清空队列。
    - 新UI普通命盘点击不应产生 灵识窃取 队列，不能把 当前聚焦心声NPC 当成已执行行动。
  补丁策略:
    - /系统/心音回响、/系统/当前聚焦心声NPC、/NPC/${NPC名}/心声探测态 均已由 schema/initvar 定义，优先使用 replace。
    - 若额外模型解析开启，额外模型可以补全 心音回响 与 心声探测态，但不得覆盖掉正文已合理写入的场景上下文。
