---
# 世界书条目：宗门文化（蓝灯，始终激活）
宗门文化:
  meta:
    状态: 蓝灯
    说明: 合欢宗常驻文化层。负责日常氛围、语言、服饰、建筑和凝视秩序，不揭示欲海暗线真相。
    插入位置: after_character_definition

  组织/势力:
    合欢宗:
      概述: 合欢宗把身体反应、双修效率、服饰状态和他人凝视都纳入修行秩序。宗内不把欲望视为私事，而视为可被安排、记录、评价的修炼材料。

      核心规则/信条:
        欲可入道:
          内容: 性与欲不是污点，而是功法运行的一部分。
          来源/背景: 合欢诀以地脉阴气和双修交换为根基。
          执行: 宗门公开教授体位经络、采补节律、合修礼仪与恢复法。
          张力: 公开不等于自由。越公开，越容易被比较、被评价、被支配。

        身体可被观看:
          内容: 衣襟是否松散、气息是否紊乱、双修后步态是否虚浮，都可能成为同门判断修炼状态的依据。
          执行: 女修可随口谈论合修体验，执事可登记双修结果，弟子可在廊间传出风声。
          张力: P2中这种文化会转化为羞名、烙名、日课检视与被世界围观的压力。

        服饰服从修炼:
          内容: 衣料、腰带、领口、裙摆和鞋履都以随时进入修炼状态为设计目的。
          执行: 不同阶层、不同用途、不同日课会有不同衣饰规范。
          张力: P1中是宗门风情；P2中变成玩家被发付、被扣合、被迫承受的身份标记。

      组织氛围/文化:
        - 熏香长期萦绕，合欢花香带着体温般的甜腻，入夜后因双修频繁而更浓。
        - 廊间常有女修倚栏轻笑，发丝未绾，衣襟微敞，那是合修后的自然状态，不是刻意遮掩。
        - 环佩声、吐纳声、远处双修室的低声喘息与石壁灵脉脉动混在一起，形成宗门日常背景。
        - 石壁常年潮湿，地脉阴气凝结在缝隙中，指尖触上去会有微麻灵压。

  语言与称谓:
    日常寒暄:
      - 昨夜与谁合修了、阳气滋味如何，在宗内近似凡人问候饮食起居。
      - 高阶女修评价男修合修表现，如同评价丹药火候或灵脉成色。
      - 男修之间会讨论如何恢复阳气、如何让师姐满意，因为这关系到资源和地位。

    P1语义:
      - 玩家仍可被称作外门弟子、师弟、练阳诀男修。
      - 互动重点是偶遇、攻略、双修试探、欲海风险和攻略值变化。

    P2语义:
      - 玩家可被称作牝奴、受印者、承命之身、课令承受者。
      - 描写重点是羞耻感、抗拒、身体被牝印牵动、被NPC凝视、被风声围观。
      - P2的资源动作应写作执事库发付、日课领受、法器匣扣合、烙名录记名。

  服饰制度:
    设计哲学:
      内容: 不以裸露为尺度，而以随时可进入修炼状态为核心。衣料垂坠、腰带松紧、领口开合，都服务于合修、采补、检查与身份区分。
      P2转义: 普通服饰进入P2后不再只是审美，而会成为执事库发付、法器匣扣合、日课要求和羞名记录的载体。

    女修日常:
      材质: 轻罗、软缎、薄纱，贴身透气，适合双修后体温升高。
      上装: 交领短袄或对襟襦衫，领口比凡间低半指，便于快速解开。
      下装: 高腰襦裙或马面裙，裙摆侧开衩，行走时露出步态与小腿线条。
      配色: 低阶多藕荷、月白、浅灰；高阶多藏蓝、绛紫、玄黑。颜色即地位。
      整体: 站立时端庄，行走时衣料贴身轻曳，合修时结构能迅速松开。

    合修服:
      材质: 半透纱罗，比日常更轻薄。
      用途: 前往双修台、修炼室或阴阳池时穿。
      叙事作用: 显示角色已经进入可被合修、检视或安排的状态。

    男修日常:
      材质: 粗麻混棉，耐脏耐洗。
      款式: 圆领短褐，袖口收窄，腰系布带并挂木牌。
      里衣: 洁净程度会被同门暗自比较，双修前后的细节可体现处境。

    P2衣饰:
      来源: 执事库发付，不写成购买。
      装配: 通过法器匣扣合到道具.装备.玩家，不写成普通背包换装。
      作用: 让前端和叙事读取玩家当前身体约束、日课要求、羞名状态与法器影响。
      描写边界: 玩家可以清醒感到羞耻、抗拒和被迫适应，不默认写成主动享受或彻底投降。

    鞋履与配饰:
      女修: 浅口薄底绣鞋，鞋头微翘，绣纹随身份变化。双修时常半挂脚尖，成为宗门常见景象。
      男修: 黑布千层底，适合砂石路与杂务。
      腰牌: 女修多悬玉牌，外门和男修多用木牌；执事可凭腰牌登记合修与日课记录。
      步摇: 高阶女修钗环步摇，行走时声响清脆，常先于本人进入场景。

  建筑与日常:
    修炼室:
      定义: 合欢宗基础修行空间。
      功能: 隔音阵法为标配，目的不是遮掩，而是避免不同修炼节律互相干扰。
      P2转义: 可作为单独检视、课令执行、法器调试和失仪训诫地点。

    双修台:
      定义: 沿灵脉支流修建的双修场所。
      功能: 男女修可在灵气沐浴中完成合修、采补与恢复。
      P2转义: 可从P1的攻略互动地点转为P2的日课执行地点。

    经阁:
      定义: 宗门功法、图谱、合修礼仪与阵法记录所在。
      功能: 功法图解不避讳身体，经络图、体位图与剑谱丹方并列。
      P2转义: 可用于查证牝印、法器、课令和旧案记录。

    阴阳池:
      定义: 地下灵脉枢纽，池水含浓郁灵气。
      功能: 双修灵力交换效率倍增，也是高阶仪式和暗线改造的核心场域。
      P2转义: 与牝印、欲海核心和失败后改造存在暗线联系，具体真相由「欲海与印记」承接。

  闭环边界:
    常驻职责:
      - 始终提供合欢宗的身体文化、凝视文化和双修日常。
      - 为P2羞名、烙名、日课、法器佩戴提供合理社会土壤。
      - 不主动揭示青云道人、欲海核心和九天驭奴诀真相。

    与世界设定的关系:
      - 世界设定说明合欢宗为何存在、如何组织、P1/P2如何转换。
      - 宗门文化说明这些规则在日常生活中如何被看见、听见和感受到。

    与欲海与印记的关系:
      - 宗门文化只表现表层秩序。
      - 欲海与印记解释暗线机制、检测来源和P2牝印根源。
