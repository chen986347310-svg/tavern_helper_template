# 世界书条目：世界运行规则（绿灯，关键词触发）
世界运行规则:
  meta:
    状态: 绿灯
    触发词:
      - 时间结算
      - 欲海状态
      - 欲海遮蔽
      - 搜寻进度
      - 事件记录
      - 事件后果
      - NPC日程
      - 过夜
      - 日课
    说明: >-
      时间、欲海、NPC日程与事件后果账本的资料库。
      蓝灯只保留短硬约束；本条目按关键词触发，提供耗时参考、日程参考和事件记录示例。
    插入位置: before_character_definition

  短摘要: >-
    待处理交互被承接时必须同步做时间结算；跨过亥时则过夜并减少剩余天数；
    涉及NSFW、欲海遮蔽、投欲钥或改变阵法时必须更新欲海状态；
    重大事件写入剧情.事件记录，作为后续风声、心音、NPC反应与P2日课的因果来源。

  耗时参考:
    普通对话:
      耗时: 一刻钟内
      时辰推进: false
      时间状态: 最近事件类型=对话，最近结算原因=普通对话不推进时辰
    扫地杂务:
      耗时: 一个时辰
      时辰推进: true
      时间状态: 最近事件类型=扫地，最近结算原因=杂务推进一个时段
    追查风声:
      耗时: 一个时辰
      时辰推进: true
      时间状态: 最近事件类型=追查风声，最近结算原因=循风声入局推进一个时段
    装备或卸下:
      耗时: 一刻钟内
      时辰推进: false
      时间状态: 最近事件类型=装备道具或卸下
    使用普通物品:
      耗时: 一刻钟内
      时辰推进: false
      时间状态: 最近事件类型=使用物品
    NSFW或深度亲密:
      耗时: 一个时辰
      时辰推进: true
      欲海: 非遮蔽时增加搜寻进度；遮蔽时只留下极低波纹
    特殊事件:
      耗时: 一个或多个时辰
      时辰推进: true
      说明: 闭关、禁地探索、长途移动可跳过多个时辰，但必须写明原因
    时间延长:
      耗时: 不耗时
      时辰推进: false
      变量: 增加系统.剩余天数，并写系统.时间状态

  过夜规则:
    - 时辰顺序为 晨时 -> 午时 -> 酉时 -> 亥时。
    - 若事件从亥时继续推进一个时段，系统.时辰 置为 晨时，系统.时间状态.当前日 +1，系统.剩余天数 -1。
    - 过夜时 系统.时间状态.是否过夜 必须为 true。
    - 剩余天数归零后进入牝奴期，不继续扣成负数。

  欲海状态规则:
    基础:
      - 系统.欲海状态.搜寻进度 取值 0~100。
      - 警戒等级为 平静/微动/警觉/锁定/已改写。
      - NSFW或深度亲密会让搜寻进度上升；越深、越公开、越接近欲海相关场景，上升越明显。
    遮蔽:
      - 使用欲海遮蔽符后，写入 遮蔽剩余时段 与 遮蔽来源。
      - 遮蔽剩余时段大于0时，NSFW不得明显增加搜寻进度；可写为极低波纹，并减少遮蔽剩余时段。
    投欲钥:
      - 投欲钥不是普通购物事件；承接后应将搜寻进度推向100，警戒等级为锁定，已被定位为true，并进入牝奴期路线。
    改变阵法:
      - 改变阵法应改写或关闭欲海压力，警戒等级可写为已改写，搜寻进度归零或不再增长。

  NPC日程资料:
    白芷:
      晨时: 莲灯前苑或经阁外围，洒扫、整理旧卷
      午时: 经阁、静室，避开苏芸的喧闹
      酉时: 听风廊、莲灯前苑，整理风声残页
      亥时: 私密静室，心防较强
    苏芸:
      晨时: 外门广场或药庐，晨课、试药
      午时: 药庐暖阁，丹炉和药签事件高发
      酉时: 阴阳池外围或药庐，药性观察
      亥时: 暖阁深处，适合错炉线索
    纪兰:
      晨时: 双修册登记处，记录弟子行止
      午时: 听风廊或经阁，查禁录、问口供
      酉时: 执事名册旁，掌握公开事件痕迹
      亥时: 账房或禁录室，适合事件后果归档
    沈月秋:
      晨时: 资源调配处或阴阳池外围
      午时: 经阁、灵石账房，核算与交易
      酉时: 阴阳池、渊底灵脉外围，资源失衡事件
      亥时: 掌门殿偏殿外，处理高阶事务
    柳素衣:
      晨时: 掌门殿，不轻易露面
      午时: 掌门殿偏殿，处理宗门因果
      酉时: 阴阳池或渊底灵脉，欲海警戒升高时介入
      亥时: 掌门殿深处，牝奴期或锁定事件中出现

  事件后果账本:
    写入时机:
      - 追查风声成功或失败但留下余波。
      - 特殊道具生效，例如时间延长、欲海遮蔽符、投欲钥、改变阵法。
      - NSFW导致欲海状态变化、公开失态、NPC记忆或风声余波。
      - P2日课、支配者传唤、公开示众或羞名风声。
    字段要求:
      - id: event_日期_时辰_类型 或稳定短ID
      - 类型: 对话/扫地/追查风声/使用物品/NSFW/特殊事件/P2日课等
      - 摘要: 一句话说明事件结果
      - 日: 系统.时间状态.当前日
      - 时辰: 系统.时辰
      - 地点: 系统.场景上下文.地点
      - 涉及NPC: 核心NPC数组，可为空
      - 公开度: 公开/半私密/私密/禁地
      - 后果标签: 欲海波动、风声追查、时间延长、遮蔽生效、公开失态等短标签
      - 已生成风声: 是否已同步写入系统.风声列表
    增长限制:
      - 剧情.事件记录 最多保留最近20条。
      - 超出时 replace 为裁剪后的完整数组，不要无限 insert。

  输出提示:
    - 本资料库提供参考，不要求每楼层照抄完整表格。
    - 真正的强制输出以 系统.时间状态、系统.欲海状态、剧情.事件记录 和变量输出格式为准。
