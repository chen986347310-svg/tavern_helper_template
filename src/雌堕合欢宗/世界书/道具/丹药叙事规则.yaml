丹药使用读取规则:
  读取来源:
    - 系统.待处理交互
    - 道具.拥有
    - 道具.已生效效果
    - 系统.场景上下文
  核心原则:
    - 丹药只由前端扣库存，AI 不得重复扣除。
    - 丹药叙事必须先承接身体、心神、场景变化，再清空 系统.待处理交互。
    - 逻辑名用于变量主键，显示名用于正文叙事。
    - 临时丹药制造短期场景，永久丹药固化长期变化，仙奴丹服务归属、羞耻外显和身体可玩乐化。
    - 不机械复述字段名，应把分类、药阶、作用线和 AI短提示转化为当前场景里的自然反应。

