特殊道具事件读取规则:
  核心边界:
    - 商城特殊道具是显式的事件种子，玩家明确知道按下去会发生什么，用来撬动世界规则本身。
    - 与剧情钥匙（被动伏笔池）对偶：特殊道具是主动戏剧炸弹，购买后 AI 应立即承接，演到自然收束。
    - 特殊道具不默认进入剧情钥匙/场景令牌的风声追查链；`欲海回声`、`投欲钥`、`改变阵法` 是购买即生效事件，不应要求玩家再追查风声才触发。
    - 特殊道具不进 `道具.拥有`（除欲海遮蔽符与时间延长这类自用消耗品外）。
    - 不靠前端状态机维持效果；持久后果由 AI 作为剧情结果自行写入 JSONPatch，解除也由 AI 在剧情中自然决定。
    - 与世界书 `欲海与印记` 完全咬合：欲海核心镇压青云道人残存意识，由柳素衣以牝奴诀改造制成；玩家所用九天驭奴诀正是青云道人临终之作。
  AI承接方式:
    - 【最低承认底线】正文中必须至少有一句承认该特殊道具入手或激活；禁止"队列清空了但正文一字未提"。即使首楼层正在演 NPC 拜访、开场旁白或其他剧情，也必须挤进一句承认。
    - 【高优先级承接】欲海回声、投欲钥、改变阵法这三件**购买即生效**道具的承接是楼层叙事的最高优先级，不得被开场叙事、NPC 互动或其他剧情压过：
      - 欲海回声购买后必须立即让玩家"听见青云道人残存意识"——破碎的话语、欲海湿气、扭曲回响，至少 3-5 句叙事，不能只一句带过。
      - 投欲钥购买后必须立即触发柳素衣依牝奴诀仪轨投阴阳池流程，必须在剧情中写入 系统.阶段='牝奴期'。
      - 改变阵法购买后必须立即触发 GOOD END 序幕。
    - '`系统.待处理交互` 中出现特殊道具购买时，立即在叙事中承接事件种子，让玩家的主动操作产生明确戏剧后果。'
    - 若变量中存在 `剧情.线索状态[特殊道具名]`，购买即生效事件承接后可保持 `已触发`；不要把它改成 `可追查`。
    - 可写事后余波风声，但余波只表现世界反应，不作为同一特殊事件的二次触发入口；默认不需要进入活跃 `系统.风声列表`。
    - 演到自然收束即可，不需要倒计时机制；持续多个楼层时由 AI 自主判断节奏。
    - 持久状态（如阶段切换、NPC 关系改写）由 AI 自己写 JSONPatch，前端不预设字段。
    - 承接后必须清空已处理的待处理交互，禁止只清队列不写剧情。

特殊道具资料:
  时间延长:
    显示名: 时间延长
    类型: 自用消耗
    事件种子: 玩家额外获得若干修行天数，欲海定位倒计时被推后。
    叙事重点: 不是简单"剩余天数+N"的数值修正，而是玩家用灵石买回与命运赛跑的余地；可让 NPC 注意到玩家最近"闲下来"或反而"更紧迫"。

  改变阵法:
    显示名: 改变阵法
    类型: 购买即生效
    事件种子: 玩家与柳素衣共同改写宗门核心阵法。
    叙事重点: 欲海核心熄灭、青云道人残存意识被释放或归于沉寂、玄媚仙奴反向同化完成，触发 GOOD END。柳素衣此时与玩家立场实质对调。

  欲海遮蔽符:
    显示名: 欲海遮蔽符
    类型: 自用消耗
    事件种子: 玩家短暂遮蔽九天驭奴诀气息，欲海核心暂时失嗅。
    世界观锚点: 设定原文「灵石可购买气息遮蔽换取额外天数」直接对应；这枚符箓据传为青云宗覆灭前散落民间的遗物。
    叙事重点: 使用窗口期内 NSFW 不被欲海记录、柳素衣无法借此定位玩家。窗口长短由 AI 决定（通常一日，可视场景延展）。窗口结束时可由 AI 自然补一句"符箓灵光黯淡"。
    禁止: 不要把遮蔽符做成"永久关闭欲海"，那会破坏世界压力。

  欲海回声:
    显示名: 欲海回声
    类型: 购买即生效（一次性事件）
    事件种子: 玩家持青铜残钟贴在阴阳池阵眼上，短暂接通欲海核心，听见镇压在内的青云道人残存意识。
    世界观锚点: 欲海核心由柳素衣以牝奴诀改造青云道人肉身、与渊底灵脉融合制成；青云道人临终融会贯通九天驭奴诀，玩家穿越时被系统赐予，本质上是青云道人的"二代"。
    叙事重点: 这是世界真相揭示级剧情爆点。青云道人的残存意识可能展现以下四种姿态之一（由 AI 根据当下剧情氛围选择最合适的一种，或混合）：
      - 复仇请求：让玩家"以宗门内部反向同化"完成他未竟的报复
      - 救赎请求：他已厌倦欲海，请玩家想办法毁掉欲海核心、解放他
      - 冷漠拒答：他已被欲海同化得太彻底，只剩残念碎片，对玩家漠不关心
      - 认知翻转：揭示玩家本质上是他的某种投影、延续或转世——meta 级身份揭示
    持久后果: AI 可选择是否写入玩家对青云道人态度的字段，或在后续 NPC 对话中埋伏笔。
    禁止: 不要让青云道人的话变成"系统说明书"——他是个被改造了百年、与欲海融合的残念，语言应破碎、扭曲、带欲海湿气。

  投欲钥:
    显示名: 投欲钥
    类型: 购买即生效（一次性事件、命运触发器）
    事件种子: 玩家主动激活气息，让欲海核心精确定位自己，触发柳素衣依牝奴诀仪轨投入阴阳池。
    世界观锚点: 与「改变阵法」对偶——改变阵法是玩家主动选 GOOD END，投欲钥是玩家主动选 BAD END。设定原文「柳素衣确认后执行欲海改造——投入阴阳池→练阳诀粉碎→牝奴诀强灌→雌堕为牝奴」是这个事件的标准流程。
    叙事重点: 这不是失败、不是被抓，是玩家承认自己是青云道人的二代、主动接受被改造的命运。要演出"主动跪伏"的戏剧重量，而不是被动 game over。柳素衣可能困惑、可能早料到、可能既哀且喜。
    持久后果: AI 必须在剧情中写入 `系统.阶段 = '牝奴期'`，可同时调整 `系统.剩余天数 = 0` 表示攻略期结束，并按需调整牝奴期相关字段。
    禁止: 不要写成单纯的"自动 BAD END 跳关"，必须让玩家的主动选择被叙事承认；柳素衣的反应也不应是程式化的"恭喜进入 BAD END"。
