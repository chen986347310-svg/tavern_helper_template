---
禁器装备读取规则:
  读取来源:
    - 道具.装备.玩家
    - 道具.装备.[NPC名]
    - 系统.场景上下文.在场NPC
    - 系统.场景上下文.公开度
    - 系统.待处理交互
  核心原则:
    - 禁器是合欢宗内部流通的偏门法器，不是外来现代器具。
    - 禁器不只在性爱过程生效；公开场景中的声音、气味、姿态、衣料痕迹、旁人视线同样会制造羞耻。
    - 禁器只影响描写、姿态、羞耻、风声、心音和身体可玩乐性，不直接修改好感度、攻略值、堕落度等变量。
    - 装备或卸下后，下一楼层必须自然承接该变化，并清空已处理的 系统.待处理交互。
    - 卸下后不得继续描写该禁器的当前效果，除非作为残留痕迹、回忆、风声或旁人猜测。

场景公开度规则:
  公开:
    写法: 重点写遮掩失败、铃声泄露、香气外溢、步态不自然、旁人误会或察觉。
  半私密:
    写法: 重点写她知道你知道，却不能当众说破；眼神、呼吸、手势和衣料变化成为暗号。
  私密:
    写法: 可以更直白地写身体反应、器官触发、法器牵引和主动/被动玩弄感。
  禁地:
    写法: 强调禁器与灵气、命契、心音、风声的异常共鸣，避免机械复述装备清单。

器阶:
  启羞器阶: 让身体反应被看见、听见、闻见；重点是羞耻被外显。
  缚身器阶: 限制动作，让行礼、走路、跪坐、抬手等日常行为带上被调教痕迹。
  化器器阶: 把身体部位改造成可被触发、可被读取、可被玩乐的性器官。
  命契器阶: 把器官反应与归属、命契、心音、风声绑定，适合高攻略或仙奴线。

禁器叙事规则:
  铃铛项圈:
    显示名: 听铃颈环
    器阶: 启羞器阶
    作用部位: 颈项
    羞耻触发: [铃声泄露, 被点名, 快步, 低头行礼]
    描写重点: 戴在脖颈上的细铃会随细小动作出声；公开场景里，铃声比语言更先暴露她的紧张。
  眼罩:
    显示名: 遮灵绡眼
    器阶: 启羞器阶
    作用部位: 灵识
    羞耻触发: [看不见路, 被牵引, 听见脚步, 被旁观]
    描写重点: 视线被遮后，耳边呼吸、衣料摩擦和旁人视线会被放大；她看不回去，只能被看。
  口塞:
    显示名: 缄声玉枚
    器阶: 启羞器阶
    作用部位: 口舌
    羞耻触发: [辩解失败, 口齿含混, 被询问, 只能点头]
    描写重点: 玉枚压住舌面，让她越想解释越说不清；眼神和含混声音成为替代语言。
  羞玉坠:
    显示名: 显羞玉坠
    器阶: 启羞器阶
    作用部位: 心口
    羞耻触发: [心跳加快, 被注视, 撒谎, 公开场景]
    描写重点: 玉坠随心跳和羞意变色，适合在旁人面前揭穿她的强装镇定。
  含香舌扣:
    显示名: 含香舌扣
    器阶: 启羞器阶
    作用部位: 口舌
    羞耻触发: [说话带香, 舌尖发麻, 被近距离听见, 辩解]
    描写重点: 舌扣让说话带出药香和含混尾音；越解释越像泄露身体异样。
  听命耳坠:
    显示名: 听命耳坠
    器阶: 启羞器阶
    作用部位: 灵识
    羞耻触发: [听见命令, 被叫名字, 耳尖发热, 旁人靠近]
    描写重点: 耳坠在听见命令或名字时轻震，像身体先替她应下。
  束缚绳:
    显示名: 缚影玄绳
    器阶: 缚身器阶
    作用部位: 腰腹
    羞耻触发: [行礼, 抬手, 转身, 姿态被牵引]
    描写重点: 玄绳不必绑死，只要动作偏离，就会牵住腰肢和手腕纠正姿态。
  乳夹链:
    显示名: 牵乳银链
    器阶: 缚身器阶
    作用部位: 乳首
    羞耻触发: [抬手, 衣料摩擦, 转身, 铃链轻响]
    描写重点: 银链牵住乳首，抬手和转身都会拉出细响；胸前不自然比裸露更难遮掩。
  肛塞:
    显示名: 后庭莲钉
    器阶: 缚身器阶
    作用部位: 后庭
    羞耻触发: [久坐, 快步, 跪坐, 起身]
    描写重点: 坐下、起身、跪拜时都提醒她后庭被占着；端庄姿态反而放大存在感。
  乳头夹:
    显示名: 乳铃寒扣
    器阶: 缚身器阶
    作用部位: 乳首
    羞耻触发: [寒意, 衣料摩擦, 挺立, 被注视]
    描写重点: 寒扣固定乳尖，衣料一蹭就让胸前反应明显；遮掩动作本身也会引人注意。
  尾巴塞:
    显示名: 步摇尾坠
    器阶: 缚身器阶
    作用部位: 后庭
    羞耻触发: [尾坠摇动, 回头遮掩, 公开行走, 旁人误会]
    描写重点: 尾坠随步摇动，把后庭法器伪装成装饰，也把羞耻摆到身后给人看。
  牵膝玉扣:
    显示名: 牵膝玉扣
    器阶: 缚身器阶
    作用部位: 腰腹
    羞耻触发: [并膝, 慢步, 跪坐, 被催促]
    描写重点: 玉扣限制步幅，让走路、跪坐和起身都像被训练过。
  阴道球:
    显示名: 玉涡含珠
    器阶: 化器器阶
    作用部位: 阴户
    羞耻触发: [行走, 上台阶, 运气, 夹腿]
    描写重点: 玉珠藏在阴户内，走动和运气时滚动；公开场景里重点写她意识到那里被触发。
  阴蒂环:
    显示名: 命门欲环
    器阶: 化器器阶
    作用部位: 阴蒂
    羞耻触发: [心绪波动, 夹腿, 被命令, 衣料压迫]
    描写重点: 欲环随羞意、命令或衣料压迫发热，让阴蒂成为心绪触发点。
  贞操带:
    显示名: 锁阴寒玉带
    器阶: 化器器阶
    作用部位: 阴户
    羞耻触发: [落锁声, 衣下冷意, 被检查, 行礼]
    描写重点: 寒玉带锁住下身，落锁声像把私处交给别人保管；强调封存和管理感。
  淫纹:
    显示名: 噬心淫纹
    器阶: 化器器阶
    作用部位: 肌肤
    羞耻触发: [心跳, 谎言, 被注视, 欲念]
    描写重点: 纹路随心跳、谎言和羞意游走发亮，让身体反应直接写在皮肤上。
  子宫听潮坠:
    显示名: 听潮坠
    器阶: 化器器阶
    作用部位: 丹田
    羞耻触发: [灵气波动, 腹内发热, 运功, 被靠近]
    描写重点: 丹田灵气波动转成腹内热潮，让修炼场景也能触发身体羞耻。
  乳泉引:
    显示名: 乳泉引
    器阶: 化器器阶
    作用部位: 乳房
    羞耻触发: [胸口发胀, 衣料湿痕, 被闻见, 情绪动摇]
    描写重点: 胸口容易发胀或出现细微湿痕；重点写她慌忙遮掩和被察觉的风险。
  命铃锁喉环:
    显示名: 命铃锁喉环
    器阶: 命契器阶
    作用部位: 颈项
    羞耻触发: [主人靠近, 命令, 公开身份, 铃声应命]
    描写重点: 命铃对特定气息或命令作出反应，像身份宣告。
  照心缚魂索:
    显示名: 照心缚魂索
    器阶: 命契器阶
    作用部位: 灵识
    羞耻触发: [心防动摇, 灵识聚焦, 心音外泄, 被追问]
    描写重点: 心防一松就显出裂隙，让心音像被递到人手边。
  莲印禁契钉:
    显示名: 莲印禁契钉
    器阶: 命契器阶
    作用部位: 阴户
    羞耻触发: [莲印发热, 被认主, 合欢气息, 公开遮掩]
    描写重点: 私处与莲印相连，合欢气息一近，印纹便像认主般发热。
  掌心牵丝戒:
    显示名: 掌心牵丝戒
    器阶: 命契器阶
    作用部位: 心口
    羞耻触发: [牵丝感应, 靠近, 伸手, 被命令]
    描写重点: 指尖和心口被牵丝相连，伸手时像主动把自己递过去。
  归主玉牌:
    显示名: 归主玉牌
    器阶: 命契器阶
    作用部位: 身份
    羞耻触发: [腰牌晃动, 被认出, 登记, 公开场景]
    描写重点: 玉牌像宗门腰牌，却刻着归属禁纹；越正式的场合越羞耻。
  合欢锁魂铃:
    显示名: 合欢锁魂铃
    器阶: 命契器阶
    作用部位: 灵识
    羞耻触发: [心音回响, 风声传播, 命契震动, 主人注视]
    描写重点: 把心音、风声和命契震动连在一起，让归属感有了声音。
