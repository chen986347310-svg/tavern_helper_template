服装装备读取规则:
  读取顺序:
    - 系统.场景上下文.地点
    - 系统.场景上下文.子区域
    - 系统.场景上下文.公开度
    - 系统.场景上下文.在场NPC
    - 道具.装备.玩家
    - 道具.装备[在场NPC]
    - 系统.待处理交互
    - 服装叙事规则[对应逻辑名]
  描写原则:
    - 不机械复述装备名，也不要每回合都提醒角色穿了什么。
    - 只在入场、移动、转身、坐下、施法、被注视、心绪波动、场景公开度变化、新装备或卸下后的下一楼层自然带出衣装影响。
    - 装备存在于 MVU 的 道具.装备 中即视为持续穿着；NPC 离场不清除，再入场仍可承接。
    - 卸下后不得继续描写该服装，除非明确作为回忆、传闻或旁人风声提及。
  适配边界:
    - 成人或高阶 NPC 可以承接更强暗示。
    - 不适配角色只写衣料、法纹、身份压迫、尴尬动作和气氛，不写露骨身体细节。
    - 玩家牝奴服只读取 道具.装备.玩家，不允许写给 NPC。
    - 服装叙事只影响描写，不直接改变好感度、攻略值、堕落度等变量。

服装叙事规则:
  杂役服:
    显示名: 素麻外门衣
    触发时机: [入场, 杂役任务, 被使唤]
    描写重点: [身份压迫, 旧衣粗糙, 动作低顺]
    边界: 低强度，不写露骨。
  开裆裤:
    显示名: 裂裾启羞裤
    触发时机: [起身, 奔走, 下跪, 被注视]
    描写重点: [遮掩, 步伐拘谨, 羞耻感]
    边界: 不适配角色仅写衣裾缺口与尴尬。
  师姐装:
    显示名: 绛纱欲授裳
    触发时机: [指导, 训话, 靠近, 施法]
    描写重点: [身份反差, 绛纱轻晃, 教导压迫]
    边界: 不写成现代制服诱惑。
  药庐制服:
    显示名: 药香贴汗衣
    触发时机: [炼丹, 诊脉, 端药, 出汗]
    描写重点: [药香, 汗意, 袖口, 腰身]
    边界: 避免医疗场景过度露骨。
  经阁制服:
    显示名: 墨香半掩裳
    触发时机: [翻书, 夜读, 藏卷, 低头]
    描写重点: [墨香, 衣襟, 指尖, 书页遮掩]
    边界: 保持书卷气，不粗俗。
  透视纱衣:
    显示名: 月涎透骨纱
    触发时机: [灯下, 转身, 被看见, 施法]
    描写重点: [薄纱, 骨线, 灵气轮廓, 遮掩]
    边界: 不适配角色只写灵气轮廓。
  透视肚兜:
    显示名: 桃息半掩兜
    触发时机: [紧张, 靠近, 被点名, 心绪波动]
    描写重点: [心跳, 桃息, 灵纹微亮, 半遮]
    边界: 避免具体身体部位过细描写。
  透视罗裙:
    显示名: 湿雾贴身裙
    触发时机: [入场, 转身, 奔走, 施法, 紧张, 被注视]
    描写重点: [衣料贴身, 曲线显露, 角色遮掩, 旁人目光, 灵气潮湿感]
    场景变化:
      公开: 写遮掩、目光、拘谨，不写过度私密细节。
      半私密: 写衣料贴合、气息变化、对话停顿。
      私密: 写衣装成为互动与心理压力来源。
      禁地: 写灵气侵染、衣料异常贴合、符纹或雾气异动。
    边界: 不机械复述“穿着某裙”。
  开胸襦裙:
    显示名: 绽襟含春襦
    触发时机: [低头, 行礼, 靠近, 风起]
    描写重点: [礼制破绽, 衣襟松动, 呼吸停顿]
    边界: 以襦裙礼制反差承接，不写成现代服装。
  开背长裙:
    显示名: 裸脊留痕裙
    触发时机: [转身, 弯腰, 被从后方看见]
    描写重点: [脊线, 衣带勒痕, 残香, 停顿]
    边界: 不适配角色降级为背后衣带松散。
  绑带装:
    显示名: 绛绫缠乳衣
    触发时机: [挣扎, 抬手, 施法, 被扶住]
    描写重点: [绛绫收紧, 动作受限, 衣结]
    边界: 避免暴力化，强调法衣束缚。
  金属腰链:
    显示名: 垂香碎金链
    触发时机: [走路, 坐下, 靠近, 安静场景]
    描写重点: [链声, 腰线, 目光, 香气]
    边界: 不把链饰写成强制器具。
  纱幔装:
    显示名: 云幔泄春衣
    触发时机: [风起, 转身, 坐榻, 沐浴后]
    描写重点: [纱幔开合, 风, 光影, 若隐若现]
    边界: 以氛围为主，少写直白暴露。
  龟甲缚衣:
    显示名: 玄绳锁欲衣
    触发时机: [被命令, 练功, 抬手, 挣扎]
    描写重点: [绳结, 锁欲阵, 呼吸受限, 法纹]
    边界: 不写伤害，强调宗门禁制。
  吊带束缚裙:
    显示名: 悬铃牵身裙
    触发时机: [抬手, 走动, 紧张, 被叫住]
    描写重点: [铃声, 吊带牵扯, 动作停顿]
    边界: 不让声音每回合刷屏。
  金属链衣:
    显示名: 冷链贴肉衣
    触发时机: [入场, 走动, 低头, 被触碰衣链]
    描写重点: [冷意, 链重, 金属声, 动作变慢]
    边界: 不写成现代盔甲。
  金属胸罩:
    显示名: 寒金托月甲
    触发时机: [施法, 呼吸急促, 冷风, 被注视]
    描写重点: [寒金, 冷意, 压迫, 仪式]
    边界: 具体描写按角色适配降级。
  淫纹绘衣:
    显示名: 淫纹噬心衣
    触发时机: [动摇, 沉沦, 施法失败, 被诱导]
    描写重点: [符纹游走, 心绪, 红光, 法衣回应]
    边界: 不把符纹当即时结果，仍由变量决定。
  符文肚兜:
    显示名: 媚符烙心兜
    触发时机: [心跳, 撒谎, 羞怯, 靠近]
    描写重点: [心口符光, 呼吸, 谎言破绽]
    边界: 不直接改变好感或攻略值。
  花瓣衣:
    显示名: 落英贴蕊裳
    触发时机: [花苑, 夜宴, 靠近, 久站]
    描写重点: [花香, 花瓣蜷缩, 体温, 凋落]
    边界: 不写不可逆变化，除非 AI Patch 写入。
  掌门礼服:
    显示名: 掌门献契礼裳
    触发时机: [高阶剧情, 命契, 拜见, 仪式]
    描写重点: [权位, 礼服重量, 臣服感, 宗门目光]
    边界: 只给高门槛角色承接强暗示。
  铃铛装:
    显示名: 碎铃惊心衣
    触发时机: [走动, 停步, 安静对话, 被旁人听见]
    描写重点: [细铃, 声响, 心虚, 目光]
    边界: 铃声只在动作或安静场景触发。
  牝奴素衣:
    显示名: 牝印初染衣
    触发时机: [阶段进入, 醒来, 照见自身, 被称呼身份]
    描写重点: [初染, 身份落差, 衣料变薄, 玩家自觉变化]
    边界: 只写玩家，不写 NPC。
  牝奴纹衣:
    显示名: 牝纹噬身衣
    触发时机: [堕落度变化, 心绪波动, 被命令, 仪式]
    描写重点: [牝纹, 明灭, 身体规训, 命契反应]
    边界: 不直接改变量，只承接已有变量。
  牝奴链甲:
    显示名: 牝锁贴身链甲
    触发时机: [行走, 跪坐, 试图反抗, 被召唤]
    描写重点: [链声, 重量, 行动限制, 羞耻身份]
    边界: 只写玩家，只承接已有牝奴期变量。
  牝奴礼服:
    显示名: 牝奴献契礼裳
    触发时机: [终局仪式, 阶段高潮, 宗门见证]
    描写重点: [献契, 礼服, 身份完成, 命运收束]
    边界: 需要剧情或阶段支撑，不随意出现。
  白芷仙奴服:
    显示名: 晨露缚心仙奴衣
    触发时机: [白芷入场, 被点名, 低头避视, 药庐, 晨雾场景]
    描写重点: [冷露, 霜痕, 腕间束带, 戒备融化后的羞怯]
    场景变化:
      公开: 写她试图遮掩霜白束带。
      半私密: 写冷香与迟疑。
      禁地: 写霜痕受灵气牵引。
    边界: 白芷承接需降级为含蓄，不写露骨身体细节。
  苏芸仙奴服:
    显示名: 骄阳献药仙奴裙
    触发时机: [苏芸调药, 训话反被牵制, 靠近玩家, 药香变化]
    描写重点: [暖金药纹, 裙摆药香, 骄傲被命契软化]
    边界: 保留苏芸强势余味，不写成完全失去人格。
  纪兰仙奴服:
    显示名: 暮霭锁卷仙奴裳
    触发时机: [纪兰翻书, 遮脸, 低声念咒, 经阁, 夜读场景]
    描写重点: [紫雾书纹, 衣襟如书页, 话语断裂]
    边界: 不机械复述书卷意象，每次只取一两个元素。
  沈月秋仙奴服:
    显示名: 炉火烙魂仙奴甲
    触发时机: [沈月秋施压失败, 炉火旁, 长老身份被动摇]
    描写重点: [赤金炉纹, 锁甲, 火光, 强势与臣服拉扯]
    边界: 保留高阶长老压迫感，不把她写成低位 NPC。
  柳素衣仙奴服:
    显示名: 掌门堕契仙奴礼裳
    触发时机: [柳素衣掌门仪式, 宗门众目, 命契确认, 终局场景]
    描写重点: [掌门礼制, 堕契纹, 权柄反转, 华贵臣服]
    边界: 只能在高阶或终局线强承接，避免过早剧透。
