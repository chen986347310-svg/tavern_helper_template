剧情购买读取规则:
  核心边界:
    - 商城剧情商品是剧情信物、线索钥匙或因果凭证，不是普通背包道具。
    - 变量 `剧情.已解锁` 记录剧情线逻辑名，例如 `白芷旧誓线`、`苏芸错炉线`。
    - 变量 `剧情.线索状态` 记录剧情钥匙风声入口状态；购买后通常为 `可追查`，玩家点击对应风声后为 `追查中`，剧情承接完成后应改为 `已触发`。
    - 购买剧情钥匙后，前端会生成来源为 `剧情钥匙` 的固定风声；该风声是入口线索，不是永久占位。
    - 剧情钥匙不是一次性剧透；购买后只代表这条深层因果线开始进入风声、心音、场景和 NPC 反应。
    - 剧情钥匙是缓发伏笔池，不是立即触发器；解锁不等于立即把关联 NPC 推到台前，也不等于立刻切换场景。
    - 不得打断当前正在发生的剧情。若玩家此刻正与其他 NPC 互动或身处别的场景，应让当前剧情自然推进，钥匙伏笔等到合适的过渡点再唤起。
    - AI 不应把剧情信物写入 `道具.拥有`，也不应把全部真相一次性讲完。
  AI承接方式:
    - 若 `系统.待处理交互` 中出现购买剧情钥匙，仅需让信物入手或线索浮现这件事在叙事中被承认即可，不必立刻切换场景或强行调度关联 NPC 出场。
    - 若 `系统.待处理交互` 中出现 `追查风声` 且风声来源为 `剧情钥匙`，应正式推进对应剧情钥匙内容；同一次变量更新应将对应 `剧情.线索状态.*.状态` 改为 `已触发`，并从 `系统.风声列表` 移除该风声或将其状态改为 `已失效`。
    - 等待自然过渡点（场景切换、当前剧情段落收束、玩家主动靠近关联 NPC、风声或心音被触发）再让伏笔生效。
    - 当玩家主动靠近关联 NPC、走进推荐场景、或与关联道具产生交集时，已解锁剧情钥匙应优先被唤起，体现在风声、心音、NPC 异常反应或场景细节中。
    - 后续可根据 `剧情.已解锁`、当前场景、风声、心音、道具装备与丹药效果分 2-3 次推进秘密。
    - 解锁剧情线可提高对应 NPC 风声出现、心音松动、特殊场景触发和道具反应的叙事合理性。
    - 承接后必须清空已处理的待处理交互，禁止只清队列不写剧情。
    - 若剧情线需要后续多段推进，可在已触发第一段后生成新的风声；不要让同一条钥匙风声永久停留在首页活跃风声中。

剧情钥匙资料:
  白芷旧誓线:
    显示名: 断鸢玉扣
    关联NPC: 白芷
    秘密主题: 旧誓/依赖/被保护欲
    推荐场景: [听风廊, 锁心静室, 阴阳池]
    关联道具: [灵识禁器, 铃系禁器, 温药]
    解锁提示: 玉扣牵出白芷旧日誓言，后续风声与心音会更容易触到她不敢承认的依赖。
    风声种子: 听风廊有人拾到一枚裂开的玉扣，扣内旧誓灵纹仍在发热。
    叙事重点: 白芷会因旧誓与被保护欲动摇，适合从温柔安抚推进到羞耻依赖。
  苏芸错炉线:
    显示名: 错炉药签
    关联NPC: 苏芸
    秘密主题: 药庐失控/骄纵反噬/试药羞耻
    推荐场景: [药庐暖阁, 渊底灵脉, 莲纹浴房]
    关联道具: [临时丹药, 永久丹药, 体香类效果]
    解锁提示: 药签指向苏芸曾经遮掩的错炉记录，后续试药与药性反噬会更容易被触发。
    风声种子: 药庐暖阁的炉灰里翻出一枚写错剂量的药签，署名被人抹去。
    叙事重点: 苏芸越要维持骄纵姿态，越容易被错炉药性反噬，适合试药、误服和药汗失控。
  纪兰禁录线:
    显示名: 朱批禁录
    关联NPC: 纪兰
    秘密主题: 禁录审问/执事破戒/记录羞耻
    推荐场景: [经阁密室, 锁心静室, 听风廊]
    关联道具: [灵识禁器, 口舌禁器, 心音回响]
    解锁提示: 朱批禁录让纪兰的公正外壳出现裂缝，后续审问与记录会牵出她的破戒边界。
    风声种子: 经阁密室昨夜多了一页朱批禁录，字迹像是纪兰亲手压下的。
    叙事重点: 纪兰会在记录与被记录之间失衡，适合审问、心音显影和执事破戒。
  沈月秋失衡线:
    显示名: 裂算玉筹
    关联NPC: 沈月秋
    秘密主题: 数据调教/长老失衡/理性破防
    推荐场景: [渊底灵脉, 锁心静室, 阴阳池]
    关联道具: [命契禁器, 烈药, 阵法道具]
    解锁提示: 玉筹记录着沈月秋算错的一次身体反应，后续理性推演会被羞耻数据反噬。
    风声种子: 渊底灵脉旁的玉筹裂开一线，算痕偏偏停在沈月秋的名册旁。
    叙事重点: 沈月秋越想精密控制，越容易被身体数据反证，适合理性破防和失衡承认。
  柳素衣命契线:
    显示名: 素印残契
    关联NPC: 柳素衣
    秘密主题: 掌门真相/命契归属/宗门权力
    推荐场景: [掌门殿偏殿, 听风廊, 莲纹浴房]
    关联道具: [命契层服装, 命契器阶禁器, 仙奴丹]
    解锁提示: 残契牵出柳素衣真正想重写的宗门秩序，后续命契、权位与归属会开始互相咬合。
    风声种子: 掌门殿偏殿的残契印忽然亮过一瞬，像在回应某个旧主。
    叙事重点: 柳素衣的掌门威严会与命契真相冲突，适合权力羞耻、宣告和最终归属推进。
