场景购买读取规则:
  核心边界:
    - 商城出售的是令牌、密钥、通行牌或临时通行权，不是把地点本身放进背包。
    - 变量 `场景.已解锁` 只记录真实场景名，例如 `阴阳池`、`药庐暖阁`。
    - 购买场景令牌后，前端会生成来源为 `场景令牌` 的入口风声，并在 `剧情.线索状态` 中记录该场景入口状态。
    - 商城显示名不是解锁地点；AI 不应把 `合契浴令`、`暖炉试香令` 等令牌名写入 `场景.已解锁`。
    - 玩家进入已解锁场景时，应结合当前 NPC、装备、丹药、禁器与风声承接，而不是机械复述场景说明。
  叙事用途:
    - 场景主要服务调教场域、剧情钥匙、风声钩子与道具效果承接。
    - 若 `系统.待处理交互` 中出现购买场景，应先承认玩家获得对应通行权，再在后续剧情中自然开放真实地点。
    - 若玩家追查来源为 `场景令牌` 的风声，或玩家主动进入对应已解锁场景，应承接该地点入口、异常或相关 NPC 动向；同一次变量更新可将对应风声移出 `系统.风声列表` 或标记为 `已失效`，并将 `剧情.线索状态[场景名].状态` 改为 `已触发`。
    - 若当前场景已解锁，可用其 `风声钩子` 推动 NPC 到场、误会、试药、审问、公开羞耻或命契推进。
    - 场景风声是一次性入口提示，不是永久占位；触发后场景仍永久保留在 `场景.已解锁`。

场景叙事资料:
  阴阳池:
    显示名: 合契浴令
    主用途: 调教/身体反应放大
    关联NPC: [白芷, 沈月秋]
    适配道具: [湿身服装, 禁器, 临时丹药]
    进入理由: 持浴令可在夜间借用阴阳池偏池，名义上是调息，实际适合观察身体反应。
    风声钩子: 池边水汽忽然带上陌生体香，有弟子看见偏池禁制被人提前解开。
    叙事重点: 水汽会放大衣料贴身、禁器震颤和药性反应，适合羞耻调教。
  经阁密室:
    显示名: 残卷密钥
    主用途: 审问/心音/禁忌知识
    关联NPC: [纪兰, 白芷]
    适配道具: [灵识禁器, 口舌禁器, 心音回响]
    进入理由: 密钥可开启经阁残卷室，适合借查阅之名逼出隐秘心声。
    风声钩子: 残卷室灯火未灭，有人把一册合欢禁录倒扣在案上。
    叙事重点: 禁书、静室和密谈会压低声音，适合审问、心音和羞耻记录。
  掌门殿偏殿:
    显示名: 偏殿听宣牌
    主用途: 命契/权力羞耻
    关联NPC: [柳素衣, 沈月秋]
    适配道具: [命契层服装, 命契器阶禁器, 仙奴丹]
    进入理由: 听宣牌代表掌门殿偏殿临时召见权，越正式越容易把羞耻变成仪式。
    风声钩子: 偏殿玉阶新擦过，掌门印光在门缝里亮了一瞬。
    叙事重点: 权位、礼制和命契感最强，适合归属、宣告、仙奴身份推进。
  渊底灵脉:
    显示名: 渊脉沉契符
    主用途: 试药/失控/高风险事件
    关联NPC: [苏芸, 沈月秋]
    适配道具: [烈药, 永久丹药, 阵法道具]
    进入理由: 沉契符可临时压住渊底灵压，允许带人下探灵脉。
    风声钩子: 渊底灵潮提前翻涌，像有什么药性或阵纹被灵脉催动。
    叙事重点: 浓烈灵压会催化药性、阵法和身体改写，适合失控剧情。
  药庐暖阁:
    显示名: 暖炉试香令
    主用途: 试药/丹药剧情
    关联NPC: [苏芸]
    适配道具: [临时丹药, 永久丹药, 体香类效果]
    进入理由: 试香令可借用药庐暖阁，名义上是观火试香，实际适合观察丹药反应。
    风声钩子: 暖阁丹炉封泥未干，炉边留着一只写错剂量的药签。
    叙事重点: 试药、体香、药汗和误服都更自然，适合苏芸线与丹药承接。
  听风廊:
    显示名: 听风示众签
    主用途: 公开羞耻/风声传播
    关联NPC: [白芷, 纪兰, 柳素衣]
    适配道具: [铃系禁器, 公开服装, 风声追查]
    进入理由: 示众签允许在听风廊停留问讯，所有细响和传闻都会被放大。
    风声钩子: 廊下风铃无风自响，有弟子低声提起某人身上的铃声。
    叙事重点: 风声、铃声和旁观视线会放大公开羞耻，适合流言与示众。
  锁心静室:
    显示名: 锁心问契牌
    主用途: 禁器调试/心防推进
    关联NPC: [白芷, 纪兰, 沈月秋]
    适配道具: [灵识禁器, 命契禁器, 心音回响]
    进入理由: 问契牌可开启隔音静室，适合调试禁器和逼近心防。
    风声钩子: 静室门上的锁心纹发热，像刚刚记录过一段不肯出口的心声。
    叙事重点: 隔音、锁心纹和禁器感应会推进心防与命契，适合单人深谈。
  莲纹浴房:
    显示名: 莲纹净身牌
    主用途: 换衣/痕迹检查/羞耻清洗
    关联NPC: [白芷, 苏芸, 柳素衣]
    适配道具: [服装, 体香丹药, 留痕效果]
    进入理由: 净身牌可借用莲纹浴房，适合更衣、清洗和检查衣下痕迹。
    风声钩子: 浴房莲纹浮起微光，水面漂着不属于此处的药香。
    叙事重点: 清洗、换衣、体香和留痕检查都更自然，适合服装与丹药联动。
