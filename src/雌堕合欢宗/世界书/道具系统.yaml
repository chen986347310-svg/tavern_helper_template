  # ═══════════════════
  # 道具生命周期协议（前端库存 / AI叙事回写）
  # ═══════════════════
  道具生命周期协议:
    核心原则:
      - 前端是库存与交互意图的唯一写入端；AI不可重复扣库存、重复增加装备、重复解锁场景。
      - AI下一楼层必须读取 系统.待处理交互，将购买、装备、卸下、使用物品自然写成剧情结果，再清空已处理队列。
      - 若道具产生长期效果，AI应写入 道具.已生效效果 或既有角色变量，不要凭空新增未定义字段。
    分类:
      可装备:
        包含: 服装、NSFW道具、牝奴期专属道具、牝奴期专属服装
        前端行为:
          - 装备时 道具.拥有[道具名] 立即 -1。
          - 库存少于1时从背包列表消失。
          - 卸下时 道具.拥有[道具名] 返还 +1。
          - 同一件库存不能同时装备给多个目标。
        AI职责:
          - 只叙事承认装备或卸下产生的反应。
          - 不要重复修改 道具.拥有 或 道具.装备。
      目标消耗:
        包含: 永久丹药（体香丹、媚体丹、催乳丹、催情丹、固敏丹、塑形丹）
        前端行为:
          - 只能选择当前 场景上下文.在场NPC 中的核心NPC作为目标。
          - 使用后 道具.拥有[道具名] 立即 -1，库存少于1时从背包消失。
          - 写入 系统.待处理交互，类型为 使用物品，目标为所选NPC。
        AI职责:
          - 下一楼层必须描写该NPC服丹/承丹后的变化。
          - 若是长期效果，应写入 道具.已生效效果，或按既有变量更新该NPC状态。
          - 不要重复扣除背包库存。
      自用消耗:
        包含: 时间延长等玩家自用特殊物品
        前端行为:
          - 点击启用法效后立即扣除库存。
          - 写入 系统.待处理交互，目标为 玩家。
        AI职责:
          - 下一楼层叙事承认法效，并按需要更新 系统.剩余天数 等既有字段。
      解锁场景:
        包含: 阴阳池、经阁密室、掌门殿偏殿、渊底灵脉
        前端行为:
          - 购买后写入 场景.已解锁，不进入 道具.拥有。
        AI职责:
          - 可在后续风声或场景上下文中使用这些地点。
      解锁剧情:
        包含: 各NPC特殊剧情
        前端行为:
          - 购买后写入 剧情.已解锁，不进入 道具.拥有。
        AI职责:
          - 可在后续叙事中揭示对应NPC秘密。
      购买即生效:
        包含: 改变阵法
        前端行为:
          - 购买后立即标记 系统.已使用阵法，不进入背包。
        AI职责:
          - 下一楼层承认阵法因果变化，不要再把该物品加入背包。