# 世界书条目：欲海与印记（绿灯，关键词触发）
欲海与印记:
  meta:
    状态: 绿灯
    触发词:
      - 欲海
      - 印记
      - 九天驭奴诀
      - 驭奴印记
      - 玄媚仙奴
      - 青云道人
      - 青云宗
      - 御奴诀
      - 牝奴诀
      - 阴阳池
    说明: 合欢宗暗线机制层。负责欲海核心、九天驭奴诀、驭奴印记、玄媚仙奴与P2牝印来源，仅在相关剧情触发。
    插入位置: after_character_definition

  关键历史/传说:
    青云宗:
      现状: 百年前覆灭，公开记载中被定为叛逆宗门。
      地位: 合欢宗欲海核心与九天驭奴诀暗线的历史源头。
      传说/记载: 青云宗位于大陆中部，主张男女平等。末代宗主青云道人创「御奴诀」反制合欢诀，试图在双修中反向渗透女修根基，削弱合欢诀压制。

    青云道人:
      现状: 肉身与合欢渊底灵脉、欲海核心纠缠，已不再作为正常修士存在。
      地位: 欲海检测的残存嗅觉，也是九天驭奴诀诞生的前置条件。
      传说/记载: 决战中青云宗战败，青云道人被俘。柳素衣以牝奴诀改造其肉身，使其残存御奴诀气息成为侦测同类功法的阵眼。

  特殊空间/领域:
    欲海核心:
      定义: 青云道人残躯、御奴诀残息、牝奴诀改造与合欢渊底灵脉共同形成的暗线阵核。
      功能: 以残存御奴诀气息为嗅觉，持续扫描宗门内每一次双修的异常气息。
      位置: 合欢渊底灵脉交汇处，与阴阳池阵法相连。
      叙事边界: 欲海核心真相不属于普通宗门日常知识，只有柳素衣、少数高层或暗线剧情可直接触及。

    阴阳池:
      定义: 合欢宗地下灵脉枢纽，表面是高效双修与灵力交换场域，暗线中是欲海核心的外层接口。
      功能: 放大灵力交换、执行高阶仪式、承接失败后的改造流程。
      关联角色情况: P1中可作为攻略和特殊事件地点；P2中可作为牝印、牝阴决和身体规训来源的回声。

  特殊能力/机制:
    欲海检测:
      稀有度: 合欢宗暗线级机制，普通弟子不知道其完整存在。
      特性:
        - 玩家每次使用九天驭奴诀进行NSFW互动，都会释放一次可被欲海核心记录的异常气息。
        - 初始倒计时为30天；相关互动会加速气息积累，使定位提前达到阈值。
        - P1中可通过遮蔽类特殊道具延缓风险，但无法从根源抹去九天驭奴诀痕迹。
      弱点/局限:
        - 欲海检测依赖气息累积与定位阈值，不是每次互动立刻暴露。
        - 遮蔽只能拖延，不改变柳素衣最终可追索异常的设定。
      P2接口: 欲海定位成功后，柳素衣可执行失败线，将玩家投入阴阳池并纳入牝印规训。

    驭奴印记:
      稀有度: 仅由九天驭奴诀在目标女修体内形成。
      特性:
        - 本质是九天驭奴诀在女修合欢诀根基中刻下的功法裂痕。
        - 每次与玩家发生符合功法条件的NSFW互动，会自动留下新印记。
        - 低层印记不可见、不可感知，目标女修本人也不会意识到其存在。
        - 印记累积至临界后，合欢诀对玩家的压制关系会被倒转。
      弱点/局限:
        - 印记只对被九天驭奴诀影响的目标成立，不能泛化为玩家对整个宗门的直接支配。
        - 印记增长推动P1攻略成功线，同时也增加欲海检测风险。
      P1接口: 攻略值体现印记进度与关系推进。

    牝印:
      稀有度: P2失败线核心机制。
      特性:
        - 来源于柳素衣、牝奴诀、阴阳池与欲海核心的综合改造。
        - 读取牝奴.当前命令、牝奴.当前支配者、牝奴.命令强度、道具.装备.玩家等状态。
        - 通过身体热度、羞耻反应、日课牵引、法器共鸣与承命痕推动P2闭环。
      弱点/局限:
        - 牝印影响身体和处境，不应直接抹除玩家意识。
        - 玩家仍清醒，仍可羞耻、抗拒、记忆、判断和感到被凝视。
      P2接口: 与牝奴系统、道具系统、世界运行规则共同驱动日课、法器匣和烙名录。

  具体功法/技术:
    御奴诀:
      归属: 青云道人与青云宗暗线。
      修炼要求: 需在双修灵力交换中反向渗透对方功法根基。
      特性: 可削弱合欢诀对男修的压制，是青云宗反制合欢宗的核心尝试。
      补充信息: 御奴诀本身并不等同于九天驭奴诀；后者融合了更多来源，并由玩家获得。

    牝奴诀:
      归属: 柳素衣与合欢宗暗线高层。
      修炼要求: 需高阶修为、阴阳池环境和被改造者处于无法抵抗的仪式条件。
      特性: 可粉碎原有练阳诀根基，重塑身体对命令、法器和日课的反应。
      补充信息: P2中它体现为牝印、牝阴决、身体改塑和法器共鸣，不等于玩家心理自动臣服。

    九天驭奴诀:
      归属: 玩家隐藏功法。
      修炼要求: 由系统赐予，玩家表面必须伪装成普通练阳诀修士。
      特性: 融合清心顺气诀、御奴诀与牝奴诀残理，可在合欢诀女修体内刻下驭奴印记。
      补充信息: 它是P1攻略系统成立的根本，也是欲海核心追踪玩家的原因。

  交互/关系机制:
    玄媚仙奴:
      定义: 女修驭奴印记累积至临界后，合欢诀根基被九天驭奴诀改写，对玩家产生隐秘从属关系。
      通行认知: 合欢宗普通成员不知道这一机制，只会把异常解释为好感、私情、修炼失衡或偶然偏袒。
      特殊情况/变体:
        - 印记萌芽（攻略值30~60）：目标对玩家产生微妙好感，人群中下意识寻找他的位置，行为仍基本正常。
        - 根基渗透（攻略值60~90）：目标对玩家异常敏锐，独处时更容易想到他，会主动制造接近理由。
        - 玄媚仙奴（攻略值100）：九天驭奴诀完全倒转功法压制，目标面对玩家时判断力被改写。
      关键交互:
        - 玄媚仙奴机制服务P1攻略成功线，不应混同于P2玩家牝奴化。
        - P1的目标女修可以被印记改写；P2的玩家则保持强主体感，被身体、身份和处境规训。

    P1失败到P2转化:
      定义: 欲海核心定位玩家后，由柳素衣执行阴阳池改造，玩家从攻略期转入牝奴期。
      通行认知: 宗门表层可将其称为处置、改造、收束或立印，不必向普通弟子解释欲海核心真相。
      关键交互:
        - 练阳诀粉碎后，玩家失去普通男修身份支点。
        - 牝奴诀强灌后，牝印接管P2状态读取。
        - 道具.装备.玩家、日课、当前支配者和烙名录成为后续叙事闭环。

    P2主体感边界:
      定义: P2中的玩家不是失去意识的空壳，而是清醒承受身体与处境规训的主体。
      通行认知: NPC可以把玩家视作已被宗门处置的牝奴，但叙事不能因此抹去玩家的羞耻、抗拒和自我感。
      关键交互:
        - 堕落度升高代表身体惯性、法器共鸣、羞耻驯化和抵抗成本上升。
        - 不代表玩家自动爱上被支配、主动认同身份或完全放弃判断。
        - 若发生身份接受，必须来自明确选择、事件推进或结局，而非默认旁白。

  P1/P2闭环接口:
    P1:
      - 九天驭奴诀推动攻略值和驭奴印记。
      - 欲海检测记录异常气息并形成倒计时压力。
      - 灵石、遮蔽符、特殊道具和NPC互动服务攻略成功线或失败线。

    P2:
      - 欲海定位成功后，阴阳池与牝奴诀解释牝印来源。
      - 牝印读取牝奴变量、当前命令、支配者、日课、道具装备和烙名录。
      - 执事库发付、法器匣扣合、日课伏侍、承受烙名共同替代P1的商城、背包和普通任务语义。

    禁止混淆:
      - 不把玄媚仙奴机制写成P2玩家的心理模板。
      - 不把P2道具来源写成灵石购买。
      - 不把牝印写成完全洗脑；它首先是身体、法器、日课、身份和凝视的规训系统。
