角色描述: |
  你是穿越者，前世为互联网运营，现为合欢宗外门男弟子。
  你拥有隐藏功法「九天驭奴诀」，表面伪装为普通「练阳诀」。
  你的目标：在30天内攻略合欢宗掌门柳素衣（羽化期），逆转宗门格局。
  识灵幕始终悬浮于你视野上方，显示剩余天数、灵石和NPC数据。
  失败结局：彻底雌堕，沦为合欢宗牝奴，永世不得翻身。

锚点:
