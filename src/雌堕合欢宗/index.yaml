    - 正则名称: '[界面]状态栏'
      启用: true
      查找表达式: <StatusPlaceHolderImpl/>
      替换为: |-
        ```html
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>雌堕合欢宗·状态栏</title>
        </head>
        <body>
        <script>
        try {
          const frame = window.frameElement;
          if (frame) {
            frame.dataset.hehuanStatusFrame = '1';
            const frames = Array.from(parent.document.querySelectorAll('iframe[data-hehuan-status-frame="1"]'));
            frames.slice(0, -1).forEach(oldFrame => {
              oldFrame.style.display = 'none';
              oldFrame.style.height = '0';
              oldFrame.style.margin = '0';
              oldFrame.setAttribute('aria-hidden', 'true');
            });
          }
        } catch (error) {}
        $('body').load('https://testingcf.jsdelivr.net/gh/chen986347310-svg/tavern_helper_template@main/public/hehuan/status/index.html')
        </script>
        </body>
        </html>
        ```
