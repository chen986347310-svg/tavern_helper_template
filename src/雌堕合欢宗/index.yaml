扩展字段:
  正则:
    - 正则名称: '[不发送]去除变量更新'
      启用: true
      查找表达式: /<update(?:variable)?>(?:(?!.*<\/update(?:variable)?>).*$|.*<\/update(?:variable)?>)/gsi
      替换为: ''
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: false
        仅格式提示词: true
      最大深度: 3

    - 正则名称: '[折叠]变量更新中'
      启用: true
      查找表达式: /<update(?:variable)?>(?!.*<\/update(?:variable)?>)\s*(.*)\s*$/gsi
      替换为: |-

        <details>
        <summary>变量更新中{{random::.::..::...}}</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[折叠]完整变量更新'
      启用: true
      查找表达式: /<update(?:variable)?>\s*(.*)\s*<\/update(?:variable)?>/gsi
      替换为: |-

        <details>
        <summary>变量更新情况</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[不发送]界面占位符'
      启用: true
      查找表达式: <StatusPlaceHolderImpl/>
      替换为: ''
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: false
        仅格式提示词: true
      最大深度: 3

    - 正则名称: '[界面]状态栏'
      启用: true
      查找表达式: <StatusPlaceHolderImpl/>
      替换为: |-
        <iframe src="http://localhost:5500/dist/%E9%9B%8C%E5%A0%95%E5%90%88%E6%AC%A2%E5%AE%97/index.html" style="width:100%;height:400px;border:none;border-radius:6px;margin:8px 0;"></iframe>
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

  酒馆助手:
